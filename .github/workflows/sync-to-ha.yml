name: Sync to Home Assistant

on:
  push:
    branches:
      - main

jobs:
  notify-ha:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Home Assistant webhook
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "${{ secrets.HA_WEBHOOK_URL }}"
