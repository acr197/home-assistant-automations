title: Energy Monitor
views:
  # ═══════════════════════════════════════════════════════════
  #  VIEW 1: OVERVIEW — at-a-glance energy summary
  # ═══════════════════════════════════════════════════════════
  - title: Overview
    path: overview
    icon: mdi:lightning-bolt
    type: panel
    # Background: the teal gradient is the fallback — it shows immediately.
    # Once you upload the power-towers photo to /config/www/energy-bg.jpg
    # the image overlays the gradient. Hard-refresh (Ctrl+Shift+R) after upload.
    background: "url('/local/energy-bg.jpg') center/cover no-repeat, linear-gradient(160deg, #071a28 0%, #030d10 60%, #0a1a10 100%)"
    cards:
      # Panel view: one top-level vertical-stack, full width.
      # horizontal-stacks inside become proper 3-column rows.
      - type: vertical-stack
        cards:

          # ══════════════════════════════════════════════════════
          #  SECTION HEADER — energy monitor
          # ══════════════════════════════════════════════════════
          - type: custom:button-card
            show_name: true
            show_state: false
            show_icon: true
            icon: mdi:lightning-bolt-circle
            name: energy monitor
            tap_action:
              action: none
            hold_action:
              action: none
            styles:
              card:
                - background: transparent
                - box-shadow: none
                - border-radius: "0"
                - padding: "6px 8px 4px"
                - border-bottom: "1px solid #00b4ab"
                - margin-bottom: "4px"
              grid:
                - grid-template-areas: '"i n"'
                - grid-template-columns: "min-content 1fr"
                - grid-template-rows: min-content
              icon:
                - color: "#00b4ab"
                - width: "15px"
                - margin-right: "6px"
              name:
                - text-transform: lowercase
                - letter-spacing: "3px"
                - font-size: "11px"
                - color: "var(--secondary-text-color)"
                - text-align: left
                - justify-self: start

          # ══════════════════════════════════════════════════════
          #  TOP ROW: PECO Rate | Energy Distribution | Costs
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Top Left: PECO Rate — editable inputs with gradient header ──
              - type: entities
                title: peco
                show_header_toggle: false
                card_mod:
                  style: |
                    ha-card {
                      background: var(--ha-card-background, var(--card-background-color));
                      border-radius: 16px;
                      box-shadow: none;
                      height: 100%;
                    }

                    .card-header {
                      background: linear-gradient(135deg, #00b4ab, #6b2fa0) !important;
                      border-radius: 16px 16px 0 0 !important;
                      color: white !important;
                      font-size: 20px !important;
                      font-weight: 700 !important;
                      letter-spacing: 5px !important;
                      text-transform: lowercase !important;
                      padding: 10px 16px !important;
                    }
                    .card-content {
                      padding-top: 16px !important;
                    }
                entities:
                  - entity: sensor.peco_variable_rate
                    name: Combined Rate ($/kWh)
                    icon: mdi:lightning-bolt
                  - type: divider
                  - entity: input_number.peco_delivery_rate
                    name: Delivery ($/kWh)
                  - entity: input_number.peco_supply_rate
                    name: Supply ($/kWh)
                  - entity: input_number.peco_transmission_rate
                    name: Transmission ($/kWh)
                  - entity: input_number.peco_customer_charge
                    name: Customer Charge ($/mo)
                  - type: divider
                  - entity: input_number.billing_cycle_start_day
                    name: Billing Cycle Start Day

                content: |

                  **PECO Rate: ${{ states('sensor.peco_variable_rate') }}/kWh**

                  Last bill: **${{ states('input_number.peco_last_bill_amount') }}** for **{{ states('input_number.peco_last_bill_kwh') | int }} kWh** ({{ states('input_number.peco_last_bill_days') | int }} days)

                  <table style="width:100%;border-collapse:collapse;margin-top:8px;font-size:0.88em;">
                    <thead>
                      <tr style="background:linear-gradient(90deg,#00b4ab,#6b2fa0);">
                        <th style="color:white;padding:6px 8px;text-align:left;font-weight:600;">Component</th>
                        <th style="color:white;padding:6px 8px;text-align:right;font-weight:600;">Rate</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);">Delivery</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:var(--primary-color);">${{ states('input_number.peco_delivery_rate') }}/kWh</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);">Supply</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:var(--primary-color);">${{ states('input_number.peco_supply_rate') }}/kWh</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);">Transmission</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:var(--primary-color);">${{ states('input_number.peco_transmission_rate') }}/kWh</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;">Customer charge</td>
                        <td style="padding:5px 8px;text-align:right;color:var(--primary-color);">${{ states('input_number.peco_customer_charge') }}/mo fixed</td>
                      </tr>
                    </tbody>
                  </table>

              # ── Top Middle: Energy Distribution + usage totals ──
              - type: vertical-stack
                cards:
                  - type: energy-distribution
                    title: Energy Distribution
                    card_mod:
                      style: |
                        ha-card {
                          min-height: 270px;
                          display: flex;
                          flex-direction: column;
                          justify-content: center;
                        }
                  - type: entity
                    entity: sensor.total_energy_today
                    name: Total Usage Today
                    icon: mdi:lightning-bolt
                    card_mod:
                      style: |
                        ha-card {
                          background: var(--ha-card-background, var(--card-background-color));
                          border-radius: 16px;
                          box-shadow: none;
                        }
                  - type: entity
                    entity: sensor.total_energy_this_month
                    name: Total This Month
                    icon: mdi:lightning-bolt-circle
                    card_mod:
                      style: |
                        ha-card {
                          background: var(--ha-card-background, var(--card-background-color));
                          border-radius: 16px;
                          box-shadow: none;
                        }

              # ── Top Right: 6-block cost summary ──
              - type: vertical-stack
                cards:
                  - type: horizontal-stack
                    cards:
                      - type: entity
                        entity: sensor.total_power_draw_now
                        name: Live Power
                        icon: mdi:flash
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 205px;
                            }
                      - type: entity
                        entity: sensor.total_energy_cost_today
                        name: Cost Today
                        icon: mdi:currency-usd
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 205px;
                            }
                      - type: entity
                        entity: sensor.total_energy_cost_monthly
                        name: Cost This Month
                        icon: mdi:calendar-month
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 205px;
                            }
                  - type: horizontal-stack
                    cards:
                      - type: entity
                        entity: sensor.projected_monthly_energy_cost
                        name: Projected Bill
                        icon: mdi:chart-line-variant
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 205px;
                            }
                      - type: entity
                        entity: sensor.daily_average_energy_cost_this_month
                        name: Daily Avg Cost
                        icon: mdi:chart-bar
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 205px;
                            }
                      - type: entity
                        entity: sensor.estimated_annual_energy_cost
                        name: Est. Annual
                        icon: mdi:calendar-clock
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 205px;
                            }
                  - type: entity
                    entity: sensor.daily_average_energy_this_month
                    name: Daily Avg kWh
                    icon: mdi:chart-line
                    card_mod:
                      style: |
                        ha-card {
                          background: var(--ha-card-background, var(--card-background-color));
                          border-radius: 16px;
                          box-shadow: none;
                        }

          # ══════════════════════════════════════════════════════
          #  SECTION HEADER — power (live wattage)
          # ══════════════════════════════════════════════════════
          - type: custom:button-card
            entity: sensor.total_power_draw_now
            show_name: true
            show_state: true
            show_icon: true
            icon: mdi:flash
            name: power
            tap_action:
              action: none
            hold_action:
              action: none
            styles:
              card:
                - background: transparent
                - box-shadow: none
                - border-radius: "0"
                - padding: "10px 8px 4px"
                - border-bottom: "1px solid #e74c3c"
                - margin-bottom: "4px"
              grid:
                - grid-template-areas: '"i n s"'
                - grid-template-columns: "min-content 1fr min-content"
                - grid-template-rows: min-content
              icon:
                - color: "#e74c3c"
                - width: "15px"
                - margin-right: "6px"
              name:
                - text-transform: lowercase
                - letter-spacing: "3px"
                - font-size: "11px"
                - color: "var(--secondary-text-color)"
                - text-align: left
                - justify-self: start
              state:
                - font-size: "13px"
                - font-weight: "600"
                - color: "var(--primary-text-color)"
                - justify-self: end

          # ══════════════════════════════════════════════════════
          #  BOTTOM ROW: Gauges | Power Graph | Device Charts
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Bottom Left: "Current Usage" title + 6 real-time gauges ──
              - type: vertical-stack
                cards:
                  - type: markdown
                    content: "## Current Usage"
                    card_mod:
                      style: |
                        ha-card {
                          background: var(--ha-card-background, var(--card-background-color));
                          border-radius: 16px;
                          box-shadow: none;
                        }
                        ha-markdown {
                          padding: 12px 16px 16px !important;
                        }
                        ha-markdown h2 {
                          font-size: 24px !important;
                          font-weight: 400 !important;
                          margin: 0 !important;
                          color: var(--primary-text-color);
                        }
                  - type: horizontal-stack
                    cards:
                      - type: conditional
                        conditions:
                          - entity: input_boolean.show_device_desktop
                            state: "on"
                        card:
                          type: vertical-stack
                          cards:
                            - type: gauge
                              entity: sensor.tapo_p110m_1_current_consumption
                              name: Desktop
                              unit: W
                              min: 0
                              max: 500
                              needle: true
                              severity:
                                green: 0
                                yellow: 150
                                red: 350
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 16px 16px 0 0;
                                    box-shadow: none;
                                    min-height: 140px;
                                  }
                            - type: markdown
                              content: >
                                {%- set w = states('sensor.tapo_p110m_1_current_consumption')|float(0) -%}
                                {%- set r = states('sensor.peco_variable_rate')|float(0) -%}
                                ~${{ "%.2f" % (w * 24 / 1000 * r) }}/day
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 0 0 16px 16px;
                                    box-shadow: none;
                                    margin-top: -1px;
                                    overflow: hidden;
                                  }
                                  ha-markdown { padding: 2px 8px 10px !important; overflow: hidden !important; }
                                  ha-markdown p { text-align: center; font-size: 0.74em; color: var(--secondary-text-color); margin: 0 !important; }
                      - type: conditional
                        conditions:
                          - entity: input_boolean.show_device_nursery
                            state: "on"
                        card:
                          type: vertical-stack
                          cards:
                            - type: gauge
                              entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
                              name: Nursery Heater
                              unit: W
                              min: 0
                              max: 1500
                              needle: true
                              severity:
                                green: 0
                                yellow: 500
                                red: 1000
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 16px 16px 0 0;
                                    box-shadow: none;
                                    min-height: 140px;
                                  }
                            - type: markdown
                              content: >
                                {%- set w = states('sensor.tapo_p110m_2_nursery_heater_current_consumption')|float(0) -%}
                                {%- set r = states('sensor.peco_variable_rate')|float(0) -%}
                                ~${{ "%.2f" % (w * 24 / 1000 * r) }}/day
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 0 0 16px 16px;
                                    box-shadow: none;
                                    margin-top: -1px;
                                    overflow: hidden;
                                  }
                                  ha-markdown { padding: 2px 8px 10px !important; overflow: hidden !important; }
                                  ha-markdown p { text-align: center; font-size: 0.74em; color: var(--secondary-text-color); margin: 0 !important; }
                  - type: horizontal-stack
                    cards:
                      - type: conditional
                        conditions:
                          - entity: input_boolean.show_device_dyson
                            state: "on"
                        card:
                          type: vertical-stack
                          cards:
                            - type: gauge
                              entity: sensor.tapo_p110m_3_current_consumption
                              name: Dyson Heater
                              unit: W
                              min: 0
                              max: 2000
                              needle: true
                              severity:
                                green: 0
                                yellow: 500
                                red: 1200
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 16px 16px 0 0;
                                    box-shadow: none;
                                    min-height: 140px;
                                  }
                            - type: markdown
                              content: >
                                {%- set w = states('sensor.tapo_p110m_3_current_consumption')|float(0) -%}
                                {%- set r = states('sensor.peco_variable_rate')|float(0) -%}
                                ~${{ "%.2f" % (w * 24 / 1000 * r) }}/day
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 0 0 16px 16px;
                                    box-shadow: none;
                                    margin-top: -1px;
                                    overflow: hidden;
                                  }
                                  ha-markdown { padding: 2px 8px 10px !important; overflow: hidden !important; }
                                  ha-markdown p { text-align: center; font-size: 0.74em; color: var(--secondary-text-color); margin: 0 !important; }
                      - type: conditional
                        conditions:
                          - entity: input_boolean.show_device_basement
                            state: "on"
                        card:
                          type: vertical-stack
                          cards:
                            - type: gauge
                              entity: sensor.tapo_p110m_4_basement_heater_current_consumption
                              name: Basement Heater
                              unit: W
                              min: 0
                              max: 1500
                              needle: true
                              severity:
                                green: 0
                                yellow: 500
                                red: 1000
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 16px 16px 0 0;
                                    box-shadow: none;
                                    min-height: 140px;
                                  }
                            - type: markdown
                              content: >
                                {%- set w = states('sensor.tapo_p110m_4_basement_heater_current_consumption')|float(0) -%}
                                {%- set r = states('sensor.peco_variable_rate')|float(0) -%}
                                ~${{ "%.2f" % (w * 24 / 1000 * r) }}/day
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 0 0 16px 16px;
                                    box-shadow: none;
                                    margin-top: -1px;
                                    overflow: hidden;
                                  }
                                  ha-markdown { padding: 2px 8px 10px !important; overflow: hidden !important; }
                                  ha-markdown p { text-align: center; font-size: 0.74em; color: var(--secondary-text-color); margin: 0 !important; }
                  - type: horizontal-stack
                    cards:
                      - type: conditional
                        conditions:
                          - entity: input_boolean.show_device_guest_bedroom
                            state: "on"
                        card:
                          type: vertical-stack
                          cards:
                            - type: gauge
                              entity: sensor.guest_bedroom_desk_plug_current_consumption
                              name: Guest Bedroom
                              unit: W
                              min: 0
                              max: 1500
                              needle: true
                              severity:
                                green: 0
                                yellow: 200
                                red: 800
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 16px 16px 0 0;
                                    box-shadow: none;
                                    min-height: 140px;
                                  }
                            - type: markdown
                              content: >
                                {%- set w = states('sensor.guest_bedroom_desk_plug_current_consumption')|float(0) -%}
                                {%- set r = states('sensor.peco_variable_rate')|float(0) -%}
                                ~${{ "%.2f" % (w * 24 / 1000 * r) }}/day
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 0 0 16px 16px;
                                    box-shadow: none;
                                    margin-top: -1px;
                                    overflow: hidden;
                                  }
                                  ha-markdown { padding: 2px 8px 10px !important; overflow: hidden !important; }
                                  ha-markdown p { text-align: center; font-size: 0.74em; color: var(--secondary-text-color); margin: 0 !important; }
                      # ── 6th slot: placeholder gauge for a future device ──
                      - type: gauge
                        entity: input_number.placeholder_gauge
                        name: Open Slot
                        unit: W
                        min: 0
                        max: 1500
                        needle: true
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 140px;
                              opacity: 0.45;
                            }

              # ── Bottom Middle: Daily energy by device (14 days, per-day delta) ──
              - type: statistics-graph
                title: Daily Energy by Device - 14-Day (kWh)
                period: day
                days_to_show: 14
                stat_types:
                  - change
                chart_type: bar
                card_mod:
                  style: |
                    ha-card {
                      min-height: 290px;
                    }
                entities:
                  - entity: sensor.tapo_p110m_1_today_s_consumption
                    name: Desktop
                    color: "#f39c12"
                  - entity: sensor.tapo_p110m_2_nursery_heater_today_s_consumption
                    name: Nursery Heater
                    color: "#3498db"
                  - entity: sensor.tapo_p110m_3_today_s_consumption
                    name: Dyson Heater
                    color: "#2ecc71"
                  - entity: sensor.tapo_p110m_4_basement_heater_today_s_consumption
                    name: Basement Heater
                    color: "#e74c3c"
                  - entity: sensor.tumble_dryer_energy_daily
                    name: Tumble Dryer
                    color: "#9b59b6"
                  - entity: sensor.guest_bedroom_desk_plug_today_s_consumption
                    name: Guest Bedroom
                    color: "#1abc9c"

              # ── Bottom Right: Individual device usage ──
              - type: energy-devices-graph
                title: Individual Devices Total Usage
                card_mod:
                  style: |
                    ha-card {
                      min-height: 290px;
                      height: 100%;
                    }

          # ══════════════════════════════════════════════════════
          #  POWER ROW 2: Per-device history (24h + 7 days)
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:
              - type: statistics-graph
                title: Avg Power Draw by Device - 24h (W)
                period: hour
                days_to_show: 1
                stat_types:
                  - mean
                chart_type: bar
                entities:
                  - entity: sensor.tapo_p110m_1_current_consumption
                    name: Desktop
                    color: "#f39c12"
                  - entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
                    name: Nursery Heater
                    color: "#3498db"
                  - entity: sensor.tapo_p110m_3_current_consumption
                    name: Dyson Heater
                    color: "#2ecc71"
                  - entity: sensor.tapo_p110m_4_basement_heater_current_consumption
                    name: Basement Heater
                    color: "#e74c3c"
                  - entity: sensor.guest_bedroom_desk_plug_current_consumption
                    name: Guest Bedroom
                    color: "#1abc9c"
              - type: statistics-graph
                title: Avg Power Draw by Device - 7-Day (W)
                period: day
                days_to_show: 7
                stat_types:
                  - mean
                chart_type: bar
                entities:
                  - entity: sensor.tapo_p110m_1_current_consumption
                    name: Desktop
                    color: "#f39c12"
                  - entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
                    name: Nursery Heater
                    color: "#3498db"
                  - entity: sensor.tapo_p110m_3_current_consumption
                    name: Dyson Heater
                    color: "#2ecc71"
                  - entity: sensor.tapo_p110m_4_basement_heater_current_consumption
                    name: Basement Heater
                    color: "#e74c3c"
                  - entity: sensor.guest_bedroom_desk_plug_current_consumption
                    name: Guest Bedroom
                    color: "#1abc9c"

          # ══════════════════════════════════════════════════════
          #  SECTION HEADER — cost (purple)
          # ══════════════════════════════════════════════════════
          - type: custom:button-card
            entity: sensor.total_energy_cost_monthly
            show_name: true
            show_state: true
            show_icon: true
            icon: mdi:currency-usd
            name: cost
            tap_action:
              action: none
            hold_action:
              action: none
            styles:
              card:
                - background: transparent
                - box-shadow: none
                - border-radius: "0"
                - padding: "10px 8px 4px"
                - border-bottom: "1px solid #9b59b6"
                - margin-bottom: "4px"
              grid:
                - grid-template-areas: '"i n s"'
                - grid-template-columns: "min-content 1fr min-content"
                - grid-template-rows: min-content
              icon:
                - color: "#9b59b6"
                - width: "15px"
                - margin-right: "6px"
              name:
                - text-transform: lowercase
                - letter-spacing: "3px"
                - font-size: "11px"
                - color: "var(--secondary-text-color)"
                - text-align: left
                - justify-self: start
              state:
                - font-size: "13px"
                - font-weight: "600"
                - color: "var(--primary-text-color)"
                - justify-self: end

          # ══════════════════════════════════════════════════════
          #  COST ROW 1: Est. daily cost | 30-day cost trend
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Cost Left: Estimated daily cost per device — SVG donut chart ──
              - type: markdown
                card_mod:
                  style: |
                    ha-card {
                      background: var(--ha-card-background, var(--card-background-color));
                      border-radius: 16px;
                      box-shadow: none;
                    }
                content: >
                  {%- set cs = states('input_number.billing_cycle_start_day')|int(1) -%}
                  {%- set today = now().day -%}
                  {%- set cd = [(today - cs + 1), 1]|max if today >= cs else [(today + 30 - cs + 1), 1]|max -%}
                  {%- set rate = states('sensor.peco_variable_rate')|float(0) -%}
                  {%- set sfx = 'st' if cs in [1,21] else ('nd' if cs in [2,22] else ('rd' if cs in [3,23] else 'th')) -%}
                  {%- set k1 = states('sensor.tapo_p110m_1_this_month_s_consumption')|float(0) -%}
                  {%- set k2 = states('sensor.tapo_p110m_2_nursery_heater_this_month_s_consumption')|float(0) -%}
                  {%- set k3 = states('sensor.tapo_p110m_3_this_month_s_consumption')|float(0) -%}
                  {%- set k4 = states('sensor.tapo_p110m_4_basement_heater_this_month_s_consumption')|float(0) -%}
                  {%- set k5 = states('sensor.tumble_dryer_energy_monthly')|float(0) -%}
                  {%- set k6 = states('sensor.guest_bedroom_desk_plug_this_month_s_consumption')|float(0) -%}
                  {%- set d1 = (k1 / cd) * rate -%}
                  {%- set d2 = (k2 / cd) * rate -%}
                  {%- set d3 = (k3 / cd) * rate -%}
                  {%- set d4 = (k4 / cd) * rate -%}
                  {%- set d5 = (k5 / cd) * rate -%}
                  {%- set d6 = (k6 / cd) * rate -%}
                  {%- set dt = d1 + d2 + d3 + d4 + d5 + d6 -%}
                  {%- set dt_safe = dt if dt > 0 else 1 -%}
                  {%- set p1 = (d1 / dt_safe * 100)|round(3) -%}
                  {%- set p2 = (d2 / dt_safe * 100)|round(3) -%}
                  {%- set p3 = (d3 / dt_safe * 100)|round(3) -%}
                  {%- set p4 = (d4 / dt_safe * 100)|round(3) -%}
                  {%- set p5 = (d5 / dt_safe * 100)|round(3) -%}
                  {%- set p6 = (d6 / dt_safe * 100)|round(3) -%}
                  {%- set o1 = 25 -%}
                  {%- set o2 = 25 - p1 -%}
                  {%- set o3 = 25 - p1 - p2 -%}
                  {%- set o4 = 25 - p1 - p2 - p3 -%}
                  {%- set o5 = 25 - p1 - p2 - p3 - p4 -%}
                  {%- set o6 = 25 - p1 - p2 - p3 - p4 - p5 -%}
                  #### Est. Daily Cost per Device

                  <p style="font-size:0.82em;color:var(--secondary-text-color);margin:0 0 10px;">Cycle: <b>{{ cs }}{{ sfx }}</b> &middot; <b>{{ cd }} day{{ 's' if cd != 1 }}</b> elapsed &middot; <b>${{ rate }}/kWh</b></p>

                  <svg viewBox="0 0 42 42" width="200" height="200" style="display:block;margin:0 auto;">
                    <circle cx="21" cy="21" r="15.9155" fill="transparent" stroke="#f39c12" stroke-width="10" stroke-dasharray="{{ p1 }} {{ 100 - p1 }}" stroke-dashoffset="{{ o1 }}"/>
                    <circle cx="21" cy="21" r="15.9155" fill="transparent" stroke="#3498db" stroke-width="10" stroke-dasharray="{{ p2 }} {{ 100 - p2 }}" stroke-dashoffset="{{ o2 }}"/>
                    <circle cx="21" cy="21" r="15.9155" fill="transparent" stroke="#2ecc71" stroke-width="10" stroke-dasharray="{{ p3 }} {{ 100 - p3 }}" stroke-dashoffset="{{ o3 }}"/>
                    <circle cx="21" cy="21" r="15.9155" fill="transparent" stroke="#e74c3c" stroke-width="10" stroke-dasharray="{{ p4 }} {{ 100 - p4 }}" stroke-dashoffset="{{ o4 }}"/>
                    <circle cx="21" cy="21" r="15.9155" fill="transparent" stroke="#9b59b6" stroke-width="10" stroke-dasharray="{{ p5 }} {{ 100 - p5 }}" stroke-dashoffset="{{ o5 }}"/>
                    <circle cx="21" cy="21" r="15.9155" fill="transparent" stroke="#1abc9c" stroke-width="10" stroke-dasharray="{{ p6 }} {{ 100 - p6 }}" stroke-dashoffset="{{ o6 }}"/>
                  </svg>

                  <table style="width:100%;border-collapse:collapse;margin-top:10px;font-size:0.83em;">
                    <tr><td><svg width="12" height="12"><circle cx="6" cy="6" r="6" fill="#f39c12"/></svg> Desktop</td><td style="text-align:right;font-weight:600;color:#f39c12;">${{ "%.4f" % d1 }}/day</td><td style="text-align:right;color:var(--secondary-text-color);">{{ p1|round(1) }}%</td></tr>
                    <tr><td><svg width="12" height="12"><circle cx="6" cy="6" r="6" fill="#3498db"/></svg> Nursery Heater</td><td style="text-align:right;font-weight:600;color:#3498db;">${{ "%.4f" % d2 }}/day</td><td style="text-align:right;color:var(--secondary-text-color);">{{ p2|round(1) }}%</td></tr>
                    <tr><td><svg width="12" height="12"><circle cx="6" cy="6" r="6" fill="#2ecc71"/></svg> Dyson Heater</td><td style="text-align:right;font-weight:600;color:#2ecc71;">${{ "%.4f" % d3 }}/day</td><td style="text-align:right;color:var(--secondary-text-color);">{{ p3|round(1) }}%</td></tr>
                    <tr><td><svg width="12" height="12"><circle cx="6" cy="6" r="6" fill="#e74c3c"/></svg> Basement Heater</td><td style="text-align:right;font-weight:600;color:#e74c3c;">${{ "%.4f" % d4 }}/day</td><td style="text-align:right;color:var(--secondary-text-color);">{{ p4|round(1) }}%</td></tr>
                    <tr><td><svg width="12" height="12"><circle cx="6" cy="6" r="6" fill="#9b59b6"/></svg> Tumble Dryer</td><td style="text-align:right;font-weight:600;color:#9b59b6;">${{ "%.4f" % d5 }}/day</td><td style="text-align:right;color:var(--secondary-text-color);">{{ p5|round(1) }}%</td></tr>
                    <tr><td><svg width="12" height="12"><circle cx="6" cy="6" r="6" fill="#1abc9c"/></svg> Guest Bedroom</td><td style="text-align:right;font-weight:600;color:#1abc9c;">${{ "%.4f" % d6 }}/day</td><td style="text-align:right;color:var(--secondary-text-color);">{{ p6|round(1) }}%</td></tr>
                    <tr style="border-top:1px solid var(--divider-color);"><td style="padding-top:6px;font-weight:700;">Total</td><td style="padding-top:6px;text-align:right;font-weight:700;color:var(--primary-color);">${{ "%.4f" % dt }}/day</td><td></td></tr>
                  </table>

              # ── Cost Right: 30-day daily cost per device (bar chart) ──
              # Uses *_energy_cost_today sensors with stat_types: max.
              # Each today-sensor resets at midnight and accumulates through the day;
              # the daily max = end-of-day total, giving a reliable per-day bar chart.
              - type: statistics-graph
                title: Daily Cost Per Device - 30-Day ($)
                period: day
                days_to_show: 30
                stat_types:
                  - max
                chart_type: bar
                entities:
                  - entity: sensor.desktop_desk_plug_energy_cost_today
                    name: Desktop
                    color: "#f39c12"
                  - entity: sensor.nursery_heater_plug_energy_cost_today
                    name: Nursery Heater
                    color: "#3498db"
                  - entity: sensor.dyson_heater_plug_energy_cost_today
                    name: Dyson Heater
                    color: "#2ecc71"
                  - entity: sensor.basement_heater_plug_energy_cost_today
                    name: Basement Heater
                    color: "#e74c3c"
                  - entity: sensor.tumble_dryer_energy_cost_today
                    name: Tumble Dryer
                    color: "#9b59b6"
                  - entity: sensor.guest_bedroom_desk_plug_energy_cost_today
                    name: Guest Bedroom
                    color: "#1abc9c"

          # ══════════════════════════════════════════════════════
          #  COST ROW 2: This billing cycle | Today's costs
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Cost Left: This billing cycle breakdown ──
              - type: entities
                title: This Billing Cycle's Energy Costs
                show_header_toggle: false
                entities:
                  - entity: sensor.desktop_desk_plug_energy_cost_monthly
                    name: Desktop Desk
                    icon: mdi:desktop-tower-monitor
                  - entity: sensor.nursery_heater_plug_energy_cost_monthly
                    name: Nursery Heater
                    icon: mdi:radiator
                  - entity: sensor.dyson_heater_plug_energy_cost_monthly
                    name: Dyson Heater
                    icon: mdi:fan
                  - entity: sensor.basement_heater_plug_energy_cost_monthly
                    name: Basement Heater
                    icon: mdi:radiator
                  - entity: sensor.tumble_dryer_energy_cost_monthly
                    name: Tumble Dryer
                    icon: mdi:tumble-dryer
                  - entity: sensor.guest_bedroom_desk_plug_energy_cost_monthly
                    name: Guest Bedroom
                    icon: mdi:desk
                  - type: divider
                  - entity: sensor.total_energy_cost_monthly
                    name: Total This Month
                    icon: mdi:sigma

              # ── Cost Right: Today's breakdown ──
              - type: entities
                title: Today's Energy Costs
                show_header_toggle: false
                entities:
                  - entity: sensor.desktop_desk_plug_energy_cost_today
                    name: Desktop Desk
                    icon: mdi:desktop-tower-monitor
                  - entity: sensor.nursery_heater_plug_energy_cost_today
                    name: Nursery Heater
                    icon: mdi:radiator
                  - entity: sensor.dyson_heater_plug_energy_cost_today
                    name: Dyson Heater
                    icon: mdi:fan
                  - entity: sensor.basement_heater_plug_energy_cost_today
                    name: Basement Heater
                    icon: mdi:radiator
                  - entity: sensor.tumble_dryer_energy_cost_today
                    name: Tumble Dryer
                    icon: mdi:tumble-dryer
                  - entity: sensor.guest_bedroom_desk_plug_energy_cost_today
                    name: Guest Bedroom
                    icon: mdi:desk
                  - type: divider
                  - entity: sensor.total_energy_cost_today
                    name: Total Today
                    icon: mdi:sigma

          # ══════════════════════════════════════════════════════
          #  SECTION HEADER — usage (green)
          # ══════════════════════════════════════════════════════
          - type: custom:button-card
            entity: sensor.total_energy_this_month
            show_name: true
            show_state: true
            show_icon: true
            icon: mdi:chart-bar
            name: usage
            tap_action:
              action: none
            hold_action:
              action: none
            styles:
              card:
                - background: transparent
                - box-shadow: none
                - border-radius: "0"
                - padding: "10px 8px 4px"
                - border-bottom: "1px solid #27ae60"
                - margin-bottom: "4px"
              grid:
                - grid-template-areas: '"i n s"'
                - grid-template-columns: "min-content 1fr min-content"
                - grid-template-rows: min-content
              icon:
                - color: "#27ae60"
                - width: "15px"
                - margin-right: "6px"
              name:
                - text-transform: lowercase
                - letter-spacing: "3px"
                - font-size: "11px"
                - color: "var(--secondary-text-color)"
                - text-align: left
                - justify-self: start
              state:
                - font-size: "13px"
                - font-weight: "600"
                - color: "var(--primary-text-color)"
                - justify-self: end

          # ══════════════════════════════════════════════════════
          #  USAGE ROW: kWh stats | Daily bar 30d | Monthly bar
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Usage Middle: Daily energy bar chart (last 30 days) ──
              - type: statistics-graph
                title: Daily Energy by Device - 30-Day (kWh)
                period: day
                days_to_show: 30
                stat_types:
                  - sum
                chart_type: bar
                entities:
                  - entity: sensor.tapo_p110m_1_today_s_consumption
                    name: Desktop
                    color: "#f39c12"
                  - entity: sensor.tapo_p110m_2_nursery_heater_today_s_consumption
                    name: Nursery Heater
                    color: "#3498db"
                  - entity: sensor.tapo_p110m_3_today_s_consumption
                    name: Dyson Heater
                    color: "#2ecc71"
                  - entity: sensor.tapo_p110m_4_basement_heater_today_s_consumption
                    name: Basement Heater
                    color: "#e74c3c"
                  - entity: sensor.guest_bedroom_desk_plug_today_s_consumption
                    name: Guest Bedroom
                    color: "#1abc9c"

              # ── Usage Right: Monthly energy bar chart ──
              - type: statistics-graph
                title: Monthly Energy by Device (kWh)
                period: month
                stat_types:
                  - sum
                chart_type: bar
                max_y_axis: 300
                entities:
                  - entity: sensor.tapo_p110m_1_this_month_s_consumption
                    name: Desktop
                    color: "#f39c12"
                  - entity: sensor.tapo_p110m_2_nursery_heater_this_month_s_consumption
                    name: Nursery Heater
                    color: "#3498db"
                  - entity: sensor.tapo_p110m_3_this_month_s_consumption
                    name: Dyson Heater
                    color: "#2ecc71"
                  - entity: sensor.tapo_p110m_4_basement_heater_this_month_s_consumption
                    name: Basement Heater
                    color: "#e74c3c"
                  - entity: sensor.guest_bedroom_desk_plug_this_month_s_consumption
                    name: Guest Bedroom
                    color: "#1abc9c"
