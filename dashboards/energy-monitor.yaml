  # ═══════════════════════════════════════════════════════════
  #  VIEW 6: SETTINGS — update PECO bill rates
  # ═══════════════════════════════════════════════════════════
  - title: Settings
    path: settings
    icon: mdi:cog
    cards:
      - type: entities
        title: PECO Rate Components
        show_header_toggle: false
        entities:
          - entity: input_number.peco_delivery_rate
            name: Delivery Rate ($/kWh)
          - entity: input_number.peco_supply_rate
            name: Supply Rate ($/kWh)
          - entity: input_number.peco_transmission_rate
            name: Transmission Rate ($/kWh)
          - type: divider
          - entity: input_number.peco_customer_charge
            name: Customer Charge ($/mo)
          - type: divider
          - entity: sensor.peco_variable_rate
            name: Combined Variable Rate

      - type: entities
        title: Last Bill Info
        show_header_toggle: false
        entities:
          - entity: input_number.peco_last_bill_amount
            name: Bill Amount ($)
          - entity: input_number.peco_last_bill_kwh
            name: Bill Usage (kWh)
          - entity: input_number.peco_last_bill_days
            name: Billing Period (days)

      - type: markdown
        content: >
          ### How to Update Rates

          When you receive a new PECO bill, update the rates above:

          1. **Delivery Rate** — from "Distribution Charges" line (per kWh rate)

          2. **Supply Rate** — from "Generation Charges" line (per kWh rate)

          3. **Transmission Rate** — from "Transmission Charges" line (per kWh rate)

          4. **Customer Charge** — fixed monthly charge from bill

          5. **Bill Amount/kWh/Days** — totals from your bill for reference

          All energy cost sensors will update automatically.
