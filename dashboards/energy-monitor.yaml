title: Energy Monitor
views:
  # ═══════════════════════════════════════════════════════════
  #  VIEW 1: OVERVIEW — at-a-glance energy summary
  # ═══════════════════════════════════════════════════════════
  - title: Overview
    path: overview
    icon: mdi:lightning-bolt
    cards:
      # ── Live power + cost header row ──
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.total_power_draw_now
            name: Live Power
            icon: mdi:flash
          - type: entity
            entity: sensor.total_energy_cost_today
            name: Cost Today
            icon: mdi:currency-usd
          - type: entity
            entity: sensor.total_energy_cost_monthly
            name: Cost This Month
            icon: mdi:calendar-month

      # ── Projection & average row ──
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.projected_monthly_energy_cost
            name: Projected Bill
            icon: mdi:chart-line-variant
          - type: entity
            entity: sensor.daily_average_energy_cost_this_month
            name: Daily Avg Cost
            icon: mdi:chart-bar
          - type: entity
            entity: sensor.estimated_annual_energy_cost
            name: Est. Annual
            icon: mdi:calendar-clock

      # ── PECO bill context ──
      - type: markdown
        content: >
          ### PECO Rate: **$0.2311/kWh**

          Last bill: **$144.18** for **624 kWh** (29 days, Jan 20 – Feb 18, 2026)

          | Component | Rate |
          |---|---|
          | Delivery (distribution) | $0.10276/kWh |
          | Supply (generation) | $0.10237/kWh |
          | Transmission | $0.00787/kWh |
          | Customer charge | $11.30/mo fixed |

      # ── Real-time power gauges ──
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.desktop_desk_plug_current_power
            name: Desktop
            unit: W
            min: 0
            max: 500
            needle: true
            severity:
              green: 0
              yellow: 150
              red: 350
          - type: gauge
            entity: sensor.nursery_heater_plug_current_power
            name: Nursery Heater
            unit: W
            min: 0
            max: 1500
            needle: true
            severity:
              green: 0
              yellow: 500
              red: 1000
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.dyson_heater_plug_current_power
            name: Dyson Heater
            unit: W
            min: 0
            max: 2000
            needle: true
            severity:
              green: 0
              yellow: 500
              red: 1200
          - type: gauge
            entity: sensor.basement_heater_plug_current_power
            name: Basement Heater
            unit: W
            min: 0
            max: 1500
            needle: true
            severity:
              green: 0
              yellow: 500
              red: 1000

      # ── Total power draw history (24h) ──
      - type: history-graph
        title: Total Power Draw (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.total_power_draw_now
            name: Total Watts

  # ═══════════════════════════════════════════════════════════
  #  VIEW 2: LIVE — real-time power by device
  # ═══════════════════════════════════════════════════════════
  - title: Live Power
    path: live
    icon: mdi:pulse
    cards:
      # ── Total draw ──
      - type: entity
        entity: sensor.total_power_draw_now
        name: Total Live Power Draw
        icon: mdi:flash-alert

      # ── Per-device power history (24h overlay) ──
      - type: history-graph
        title: Power Draw by Device (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.desktop_desk_plug_current_power
            name: Desktop
          - entity: sensor.nursery_heater_plug_current_power
            name: Nursery Heater
          - entity: sensor.dyson_heater_plug_current_power
            name: Dyson Heater
          - entity: sensor.basement_heater_plug_current_power
            name: Basement Heater

      # ── 48h view for pattern detection ──
      - type: history-graph
        title: Power Draw by Device (48h)
        hours_to_show: 48
        entities:
          - entity: sensor.desktop_desk_plug_current_power
            name: Desktop
          - entity: sensor.nursery_heater_plug_current_power
            name: Nursery Heater
          - entity: sensor.dyson_heater_plug_current_power
            name: Dyson Heater
          - entity: sensor.basement_heater_plug_current_power
            name: Basement Heater

      # ── 7-day view for weekly patterns ──
      - type: history-graph
        title: Power Draw by Device (7 Days)
        hours_to_show: 168
        entities:
          - entity: sensor.desktop_desk_plug_current_power
            name: Desktop
          - entity: sensor.nursery_heater_plug_current_power
            name: Nursery Heater
          - entity: sensor.dyson_heater_plug_current_power
            name: Dyson Heater
          - entity: sensor.basement_heater_plug_current_power
            name: Basement Heater

  # ═══════════════════════════════════════════════════════════
  #  VIEW 3: COSTS — detailed cost breakdown
  # ═══════════════════════════════════════════════════════════
  - title: Costs
    path: costs
    icon: mdi:currency-usd
    cards:
      # ── Summary cards ──
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.total_energy_cost_today
            name: Today
            icon: mdi:cash
          - type: entity
            entity: sensor.total_energy_cost_monthly
            name: This Month
            icon: mdi:cash-multiple
          - type: entity
            entity: sensor.projected_monthly_energy_cost
            name: Projected Bill
            icon: mdi:chart-line-variant

      # ── Daily average + annual estimate ──
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.daily_average_energy_cost_this_month
            name: Daily Avg
            icon: mdi:chart-bar
          - type: entity
            entity: sensor.daily_average_energy_this_month
            name: Daily Avg kWh
            icon: mdi:lightning-bolt
          - type: entity
            entity: sensor.estimated_annual_energy_cost
            name: Est. Annual
            icon: mdi:calendar-clock

      # ── Today's costs per device ──
      - type: entities
        title: Today's Energy Costs
        show_header_toggle: false
        entities:
          - entity: sensor.desktop_desk_plug_energy_cost_today
            name: Desktop Desk
            icon: mdi:desktop-tower-monitor
          - entity: sensor.nursery_heater_plug_energy_cost_today
            name: Nursery Heater
            icon: mdi:radiator
          - entity: sensor.dyson_heater_plug_energy_cost_today
            name: Dyson Heater
            icon: mdi:fan
          - entity: sensor.basement_heater_plug_energy_cost_today
            name: Basement Heater
            icon: mdi:radiator
          - type: divider
          - entity: sensor.total_energy_cost_today
            name: Total Today
            icon: mdi:sigma

      # ── Monthly costs per device ──
      - type: entities
        title: This Month's Energy Costs
        show_header_toggle: false
        entities:
          - entity: sensor.desktop_desk_plug_energy_cost_monthly
            name: Desktop Desk
            icon: mdi:desktop-tower-monitor
          - entity: sensor.nursery_heater_plug_energy_cost_monthly
            name: Nursery Heater
            icon: mdi:radiator
          - entity: sensor.dyson_heater_plug_energy_cost_monthly
            name: Dyson Heater
            icon: mdi:fan
          - entity: sensor.basement_heater_plug_energy_cost_monthly
            name: Basement Heater
            icon: mdi:radiator
          - type: divider
          - entity: sensor.total_energy_cost_monthly
            name: Total This Month
            icon: mdi:sigma

  # ═══════════════════════════════════════════════════════════
  #  VIEW 4: USAGE — energy consumption (kWh)
  # ═══════════════════════════════════════════════════════════
  - title: Usage
    path: usage
    icon: mdi:chart-bar
    cards:
      # ── Today's totals ──
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.total_energy_today
            name: Total Today
            icon: mdi:lightning-bolt
          - type: entity
            entity: sensor.total_energy_this_month
            name: Total This Month
            icon: mdi:lightning-bolt-circle
          - type: entity
            entity: sensor.daily_average_energy_this_month
            name: Daily Avg
            icon: mdi:chart-line

      # ── Today's kWh per device ──
      - type: entities
        title: Today's Energy Usage (kWh)
        show_header_toggle: false
        entities:
          - entity: sensor.desktop_desk_plug_today_s_energy
            name: Desktop Desk
            icon: mdi:desktop-tower-monitor
          - entity: sensor.nursery_heater_plug_today_s_energy
            name: Nursery Heater
            icon: mdi:radiator
          - entity: sensor.dyson_heater_plug_today_s_energy
            name: Dyson Heater
            icon: mdi:fan
          - entity: sensor.basement_heater_plug_today_s_energy
            name: Basement Heater
            icon: mdi:radiator

      # ── Device share of total (this month) ──
      - type: entities
        title: Device Share of Monthly Usage
        show_header_toggle: false
        entities:
          - entity: sensor.desktop_desk_plug_share_of_total
            name: Desktop Desk
            icon: mdi:desktop-tower-monitor
          - entity: sensor.nursery_heater_plug_share_of_total
            name: Nursery Heater
            icon: mdi:radiator
          - entity: sensor.dyson_heater_plug_share_of_total
            name: Dyson Heater
            icon: mdi:fan
          - entity: sensor.basement_heater_plug_share_of_total
            name: Basement Heater
            icon: mdi:radiator

      # ── Daily energy bar chart (30 days) ──
      - type: statistics-graph
        title: Daily Energy Usage – Last 30 Days
        period: day
        days_to_show: 30
        stat_types:
          - sum
        chart_type: bar
        entities:
          - entity: sensor.desktop_desk_plug_today_s_energy
            name: Desktop
          - entity: sensor.nursery_heater_plug_today_s_energy
            name: Nursery Heater
          - entity: sensor.dyson_heater_plug_today_s_energy
            name: Dyson Heater
          - entity: sensor.basement_heater_plug_today_s_energy
            name: Basement Heater

      # ── Weekly energy (line) ──
      - type: statistics-graph
        title: Weekly Energy Usage
        period: week
        stat_types:
          - sum
        chart_type: line
        entities:
          - entity: sensor.desktop_desk_plug_today_s_energy
            name: Desktop
          - entity: sensor.nursery_heater_plug_today_s_energy
            name: Nursery Heater
          - entity: sensor.dyson_heater_plug_today_s_energy
            name: Dyson Heater
          - entity: sensor.basement_heater_plug_today_s_energy
            name: Basement Heater

      # ── Monthly energy bar chart ──
      - type: statistics-graph
        title: Monthly Energy Usage (kWh)
        period: month
        stat_types:
          - sum
        chart_type: bar
        entities:
          - entity: sensor.desktop_desk_plug_this_month_s_energy
            name: Desktop
          - entity: sensor.nursery_heater_plug_this_month_s_energy
            name: Nursery Heater
          - entity: sensor.dyson_heater_plug_this_month_s_energy
            name: Dyson Heater
          - entity: sensor.basement_heater_plug_this_month_s_energy
            name: Basement Heater

  # ═══════════════════════════════════════════════════════════
  #  VIEW 5: DEVICES — detailed per-device drill-down
  # ═══════════════════════════════════════════════════════════
  - title: Devices
    path: devices
    icon: mdi:power-plug
    cards:
      # ── Desktop Desk Plug ──
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Desktop Desk Plug"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.desktop_desk_plug_current_power
                name: Power Now
                icon: mdi:flash
              - type: entity
                entity: sensor.desktop_desk_plug_today_s_energy
                name: Today (kWh)
                icon: mdi:lightning-bolt
              - type: entity
                entity: sensor.desktop_desk_plug_energy_cost_today
                name: Cost Today
                icon: mdi:cash
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.desktop_desk_plug_this_month_s_energy
                name: Month (kWh)
                icon: mdi:calendar
              - type: entity
                entity: sensor.desktop_desk_plug_energy_cost_monthly
                name: Cost Month
                icon: mdi:cash-multiple
              - type: entity
                entity: sensor.desktop_desk_plug_share_of_total
                name: Share
                icon: mdi:percent
          - type: history-graph
            hours_to_show: 48
            entities:
              - entity: sensor.desktop_desk_plug_current_power
                name: Power (W)

      # ── Nursery Heater Plug ──
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Nursery Heater Plug"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.nursery_heater_plug_current_power
                name: Power Now
                icon: mdi:flash
              - type: entity
                entity: sensor.nursery_heater_plug_today_s_energy
                name: Today (kWh)
                icon: mdi:lightning-bolt
              - type: entity
                entity: sensor.nursery_heater_plug_energy_cost_today
                name: Cost Today
                icon: mdi:cash
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.nursery_heater_plug_this_month_s_energy
                name: Month (kWh)
                icon: mdi:calendar
              - type: entity
                entity: sensor.nursery_heater_plug_energy_cost_monthly
                name: Cost Month
                icon: mdi:cash-multiple
              - type: entity
                entity: sensor.nursery_heater_plug_share_of_total
                name: Share
                icon: mdi:percent
          - type: history-graph
            hours_to_show: 48
            entities:
              - entity: sensor.nursery_heater_plug_current_power
                name: Power (W)

      # ── Dyson Heater Plug ──
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Dyson Heater Plug"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.dyson_heater_plug_current_power
                name: Power Now
                icon: mdi:flash
              - type: entity
                entity: sensor.dyson_heater_plug_today_s_energy
                name: Today (kWh)
                icon: mdi:lightning-bolt
              - type: entity
                entity: sensor.dyson_heater_plug_energy_cost_today
                name: Cost Today
                icon: mdi:cash
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.dyson_heater_plug_this_month_s_energy
                name: Month (kWh)
                icon: mdi:calendar
              - type: entity
                entity: sensor.dyson_heater_plug_energy_cost_monthly
                name: Cost Month
                icon: mdi:cash-multiple
              - type: entity
                entity: sensor.dyson_heater_plug_share_of_total
                name: Share
                icon: mdi:percent
          - type: history-graph
            hours_to_show: 48
            entities:
              - entity: sensor.dyson_heater_plug_current_power
                name: Power (W)

      # ── Basement Heater Plug ──
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Basement Heater Plug"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.basement_heater_plug_current_power
                name: Power Now
                icon: mdi:flash
              - type: entity
                entity: sensor.basement_heater_plug_today_s_energy
                name: Today (kWh)
                icon: mdi:lightning-bolt
              - type: entity
                entity: sensor.basement_heater_plug_energy_cost_today
                name: Cost Today
                icon: mdi:cash
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.basement_heater_plug_this_month_s_energy
                name: Month (kWh)
                icon: mdi:calendar
              - type: entity
                entity: sensor.basement_heater_plug_energy_cost_monthly
                name: Cost Month
                icon: mdi:cash-multiple
              - type: entity
                entity: sensor.basement_heater_plug_share_of_total
                name: Share
                icon: mdi:percent
          - type: history-graph
            hours_to_show: 48
            entities:
              - entity: sensor.basement_heater_plug_current_power
                name: Power (W)
