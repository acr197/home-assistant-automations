title: Energy Monitor
views:
  # ═══════════════════════════════════════════════════════════
  #  VIEW 1: OVERVIEW — at-a-glance energy summary
  # ═══════════════════════════════════════════════════════════
  - title: Overview
    path: overview
    icon: mdi:lightning-bolt
    type: panel
    cards:
      # Panel view: one top-level vertical-stack, full width.
      # horizontal-stacks inside become proper 3-column rows.
      - type: vertical-stack
        cards:

          # ══════════════════════════════════════════════════════
          #  SECTION HEADER — energy monitor
          # ══════════════════════════════════════════════════════
          - type: custom:button-card
            show_name: true
            show_state: false
            show_icon: true
            icon: mdi:lightning-bolt-circle
            name: energy monitor
            tap_action:
              action: none
            hold_action:
              action: none
            styles:
              card:
                - background: transparent
                - box-shadow: none
                - border-radius: "0"
                - padding: "6px 8px 4px"
                - border-bottom: "1px solid #00b4ab"
                - margin-bottom: "4px"
              grid:
                - grid-template-areas: '"i n"'
                - grid-template-columns: "min-content 1fr"
                - grid-template-rows: min-content
              icon:
                - color: "#00b4ab"
                - width: "15px"
                - margin-right: "6px"
              name:
                - text-transform: lowercase
                - letter-spacing: "3px"
                - font-size: "11px"
                - color: "var(--secondary-text-color)"
                - text-align: left
                - justify-self: start

          # ══════════════════════════════════════════════════════
          #  TOP ROW: PECO Rate | Energy Distribution | Costs
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Top Left: PECO Rate — gradient banner + styled table ──
              - type: markdown
                card_mod:
                  style: |
                    ha-card {
                      background: rgba(255,255,255,0.04);
                      border-radius: 16px;
                      box-shadow: none;
                    }
                content: |
                  <div style="background:linear-gradient(135deg,#00b4ab,#6b2fa0);border-radius:8px;padding:7px 0 5px;text-align:center;margin-bottom:10px;">
                    <span style="color:white;font-size:22px;font-weight:700;letter-spacing:5px;font-family:sans-serif;">peco</span>
                  </div>

                  **PECO Rate: ${{ states('sensor.peco_variable_rate') }}/kWh**

                  Last bill: **${{ states('input_number.peco_last_bill_amount') }}** for **{{ states('input_number.peco_last_bill_kwh') | int }} kWh** ({{ states('input_number.peco_last_bill_days') | int }} days)

                  <table style="width:100%;border-collapse:collapse;margin-top:8px;font-size:0.88em;">
                    <thead>
                      <tr style="background:linear-gradient(90deg,#00b4ab,#6b2fa0);">
                        <th style="color:white;padding:6px 8px;text-align:left;font-weight:600;">Component</th>
                        <th style="color:white;padding:6px 8px;text-align:right;font-weight:600;">Rate</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);">Delivery</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:var(--primary-color);">${{ states('input_number.peco_delivery_rate') }}/kWh</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);">Supply</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:var(--primary-color);">${{ states('input_number.peco_supply_rate') }}/kWh</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);">Transmission</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:var(--primary-color);">${{ states('input_number.peco_transmission_rate') }}/kWh</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;">Customer charge</td>
                        <td style="padding:5px 8px;text-align:right;color:var(--primary-color);">${{ states('input_number.peco_customer_charge') }}/mo fixed</td>
                      </tr>
                    </tbody>
                  </table>

              # ── Top Middle: Energy Distribution ──
              - type: energy-distribution
                title: Energy Distribution

              # ── Top Right: 6-block cost summary ──
              - type: vertical-stack
                cards:
                  - type: horizontal-stack
                    cards:
                      - type: entity
                        entity: sensor.total_power_draw_now
                        name: Live Power
                        icon: mdi:flash
                        card_mod:
                          style: |
                            ha-card {
                              background: rgba(255,255,255,0.04);
                              border-radius: 16px;
                              box-shadow: none;
                            }
                      - type: entity
                        entity: sensor.total_energy_cost_today
                        name: Cost Today
                        icon: mdi:currency-usd
                        card_mod:
                          style: |
                            ha-card {
                              background: rgba(255,255,255,0.04);
                              border-radius: 16px;
                              box-shadow: none;
                            }
                      - type: entity
                        entity: sensor.total_energy_cost_monthly
                        name: Cost This Month
                        icon: mdi:calendar-month
                        card_mod:
                          style: |
                            ha-card {
                              background: rgba(255,255,255,0.04);
                              border-radius: 16px;
                              box-shadow: none;
                            }
                  - type: horizontal-stack
                    cards:
                      - type: entity
                        entity: sensor.projected_monthly_energy_cost
                        name: Projected Bill
                        icon: mdi:chart-line-variant
                        card_mod:
                          style: |
                            ha-card {
                              background: rgba(255,255,255,0.04);
                              border-radius: 16px;
                              box-shadow: none;
                            }
                      - type: entity
                        entity: sensor.daily_average_energy_cost_this_month
                        name: Daily Avg Cost
                        icon: mdi:chart-bar
                        card_mod:
                          style: |
                            ha-card {
                              background: rgba(255,255,255,0.04);
                              border-radius: 16px;
                              box-shadow: none;
                            }
                      - type: entity
                        entity: sensor.estimated_annual_energy_cost
                        name: Est. Annual
                        icon: mdi:calendar-clock
                        card_mod:
                          style: |
                            ha-card {
                              background: rgba(255,255,255,0.04);
                              border-radius: 16px;
                              box-shadow: none;
                            }

          # ══════════════════════════════════════════════════════
          #  SECTION HEADER — power (live wattage)
          # ══════════════════════════════════════════════════════
          - type: custom:button-card
            entity: sensor.total_power_draw_now
            show_name: true
            show_state: true
            show_icon: true
            icon: mdi:flash
            name: power
            tap_action:
              action: none
            hold_action:
              action: none
            styles:
              card:
                - background: transparent
                - box-shadow: none
                - border-radius: "0"
                - padding: "10px 8px 4px"
                - border-bottom: "1px solid #e74c3c"
                - margin-bottom: "4px"
              grid:
                - grid-template-areas: '"i n s"'
                - grid-template-columns: "min-content 1fr min-content"
                - grid-template-rows: min-content
              icon:
                - color: "#e74c3c"
                - width: "15px"
                - margin-right: "6px"
              name:
                - text-transform: lowercase
                - letter-spacing: "3px"
                - font-size: "11px"
                - color: "var(--secondary-text-color)"
                - text-align: left
                - justify-self: start
              state:
                - font-size: "13px"
                - font-weight: "600"
                - color: "var(--primary-text-color)"
                - justify-self: end

          # ══════════════════════════════════════════════════════
          #  BOTTOM ROW: Gauges | Power Graph | Device Charts
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Bottom Left: 4 real-time power gauges (card-mod styled) ──
              - type: vertical-stack
                cards:
                  - type: horizontal-stack
                    cards:
                      - type: gauge
                        entity: sensor.tapo_p110m_1_current_consumption
                        name: Desktop
                        unit: W
                        min: 0
                        max: 500
                        needle: true
                        severity:
                          green: 0
                          yellow: 150
                          red: 350
                        card_mod:
                          style: |
                            ha-card {
                              background: rgba(255,255,255,0.04);
                              border-radius: 16px;
                              box-shadow: none;
                            }
                      - type: gauge
                        entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
                        name: Nursery Heater
                        unit: W
                        min: 0
                        max: 1500
                        needle: true
                        severity:
                          green: 0
                          yellow: 500
                          red: 1000
                        card_mod:
                          style: |
                            ha-card {
                              background: rgba(255,255,255,0.04);
                              border-radius: 16px;
                              box-shadow: none;
                            }
                  - type: horizontal-stack
                    cards:
                      - type: gauge
                        entity: sensor.tapo_p110m_3_current_consumption
                        name: Dyson Heater
                        unit: W
                        min: 0
                        max: 2000
                        needle: true
                        severity:
                          green: 0
                          yellow: 500
                          red: 1200
                        card_mod:
                          style: |
                            ha-card {
                              background: rgba(255,255,255,0.04);
                              border-radius: 16px;
                              box-shadow: none;
                            }
                      - type: gauge
                        entity: sensor.tapo_p110m_4_basement_heater_current_consumption
                        name: Basement Heater
                        unit: W
                        min: 0
                        max: 1500
                        needle: true
                        severity:
                          green: 0
                          yellow: 500
                          red: 1000
                        card_mod:
                          style: |
                            ha-card {
                              background: rgba(255,255,255,0.04);
                              border-radius: 16px;
                              box-shadow: none;
                            }

              # ── Bottom Middle: Compact mini-graph (24h power) ──
              - type: custom:mini-graph-card
                entity: sensor.total_power_draw_now
                name: Total Power Draw
                hours_to_show: 24
                points_per_hour: 4
                line_width: 2
                line_color: "#00b4ab"
                fill: true
                smooth: true
                animate: true
                font_size: 75
                show:
                  points: false
                  legend: false
                  fill: true
                  extrema: true
                  labels: false
                  name: true
                  icon: false
                  state: true
                card_mod:
                  style: |
                    ha-card {
                      background: rgba(255,255,255,0.04);
                      border-radius: 16px;
                      box-shadow: none;
                      height: 100%;
                    }

              # ── Bottom Right: Stacked daily kWh chart + native usage + note ──
              - type: vertical-stack
                cards:
                  # Stacked bar — daily energy per device (apexcharts)
                  - type: custom:apexcharts-card
                    chart_type: bar
                    stacked: true
                    header:
                      show: true
                      title: Daily Energy by Device (kWh)
                      show_states: false
                      colorize_states: false
                    apex_config:
                      chart:
                        height: 220
                        background: transparent
                      plotOptions:
                        bar:
                          borderRadius: 4
                      grid:
                        borderColor: "rgba(255,255,255,0.08)"
                      xaxis:
                        labels:
                          style:
                            colors: "rgba(255,255,255,0.5)"
                            fontSize: "10px"
                      yaxis:
                        labels:
                          style:
                            colors: "rgba(255,255,255,0.5)"
                      legend:
                        labels:
                          colors: "rgba(255,255,255,0.7)"
                      tooltip:
                        theme: dark
                    card_mod:
                      style: |
                        ha-card {
                          background: rgba(255,255,255,0.04);
                          border-radius: 16px;
                          box-shadow: none;
                        }
                    series:
                      - entity: sensor.tapo_p110m_1_today_s_consumption
                        name: Desktop
                        color: "#f39c12"
                        statistics:
                          type: max
                          period: day
                      - entity: sensor.tapo_p110m_2_nursery_heater_today_s_consumption
                        name: Nursery Heater
                        color: "#3498db"
                        statistics:
                          type: max
                          period: day
                      - entity: sensor.tapo_p110m_3_today_s_consumption
                        name: Dyson Heater
                        color: "#2ecc71"
                        statistics:
                          type: max
                          period: day
                      - entity: sensor.tapo_p110m_4_basement_heater_today_s_consumption
                        name: Basement Heater
                        color: "#e74c3c"
                        statistics:
                          type: max
                          period: day
                  # Native usage bar (from Energy config)
                  - type: energy-devices-graph
                    title: Individual Devices Total Usage
                  # Footer note
                  - type: markdown
                    content: |
                      <small style="color: var(--secondary-text-color);">
                      To add or remove devices, go to **Settings → Dashboards → Energy → Individual devices**.
                      </small>

  # ═══════════════════════════════════════════════════════════
  #  VIEW 2: LIVE — real-time power by device
  # ═══════════════════════════════════════════════════════════
  - title: Live Power
    path: live
    icon: mdi:pulse
    cards:
      # ── Total draw ──
      - type: entity
        entity: sensor.total_power_draw_now
        name: Total Live Power Draw
        icon: mdi:flash-alert

      # ── Per-device power history (24h overlay) ──
      - type: history-graph
        title: Power Draw by Device (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.tapo_p110m_1_current_consumption
            name: Desktop
          - entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
            name: Nursery Heater
          - entity: sensor.tapo_p110m_3_current_consumption
            name: Dyson Heater
          - entity: sensor.tapo_p110m_4_basement_heater_current_consumption
            name: Basement Heater

      # ── 48h view for pattern detection ──
      - type: history-graph
        title: Power Draw by Device (48h)
        hours_to_show: 48
        entities:
          - entity: sensor.tapo_p110m_1_current_consumption
            name: Desktop
          - entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
            name: Nursery Heater
          - entity: sensor.tapo_p110m_3_current_consumption
            name: Dyson Heater
          - entity: sensor.tapo_p110m_4_basement_heater_current_consumption
            name: Basement Heater

      # ── 7-day view for weekly patterns ──
      - type: history-graph
        title: Power Draw by Device (7 Days)
        hours_to_show: 168
        entities:
          - entity: sensor.tapo_p110m_1_current_consumption
            name: Desktop
          - entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
            name: Nursery Heater
          - entity: sensor.tapo_p110m_3_current_consumption
            name: Dyson Heater
          - entity: sensor.tapo_p110m_4_basement_heater_current_consumption
            name: Basement Heater

  # ═══════════════════════════════════════════════════════════
  #  VIEW 3: COSTS — detailed cost breakdown
  # ═══════════════════════════════════════════════════════════
  - title: Costs
    path: costs
    icon: mdi:currency-usd
    cards:
      # ── Summary cards ──
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.total_energy_cost_today
            name: Today
            icon: mdi:cash
          - type: entity
            entity: sensor.total_energy_cost_monthly
            name: This Month
            icon: mdi:cash-multiple
          - type: entity
            entity: sensor.projected_monthly_energy_cost
            name: Projected Bill
            icon: mdi:chart-line-variant

      # ── Daily average + annual estimate ──
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.daily_average_energy_cost_this_month
            name: Daily Avg
            icon: mdi:chart-bar
          - type: entity
            entity: sensor.daily_average_energy_this_month
            name: Daily Avg kWh
            icon: mdi:lightning-bolt
          - type: entity
            entity: sensor.estimated_annual_energy_cost
            name: Est. Annual
            icon: mdi:calendar-clock

      # ── Today's costs per device ──
      - type: entities
        title: Today's Energy Costs
        show_header_toggle: false
        entities:
          - entity: sensor.desktop_desk_plug_energy_cost_today
            name: Desktop Desk
            icon: mdi:desktop-tower-monitor
          - entity: sensor.nursery_heater_plug_energy_cost_today
            name: Nursery Heater
            icon: mdi:radiator
          - entity: sensor.dyson_heater_plug_energy_cost_today
            name: Dyson Heater
            icon: mdi:fan
          - entity: sensor.basement_heater_plug_energy_cost_today
            name: Basement Heater
            icon: mdi:radiator
          - type: divider
          - entity: sensor.total_energy_cost_today
            name: Total Today
            icon: mdi:sigma

      # ── Monthly costs per device ──
      - type: entities
        title: This Month's Energy Costs
        show_header_toggle: false
        entities:
          - entity: sensor.desktop_desk_plug_energy_cost_monthly
            name: Desktop Desk
            icon: mdi:desktop-tower-monitor
          - entity: sensor.nursery_heater_plug_energy_cost_monthly
            name: Nursery Heater
            icon: mdi:radiator
          - entity: sensor.dyson_heater_plug_energy_cost_monthly
            name: Dyson Heater
            icon: mdi:fan
          - entity: sensor.basement_heater_plug_energy_cost_monthly
            name: Basement Heater
            icon: mdi:radiator
          - type: divider
          - entity: sensor.total_energy_cost_monthly
            name: Total This Month
            icon: mdi:sigma

  # ═══════════════════════════════════════════════════════════
  #  VIEW 4: USAGE — energy consumption (kWh)
  # ═══════════════════════════════════════════════════════════
  - title: Usage
    path: usage
    icon: mdi:chart-bar
    cards:
      # ── Today's totals ──
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.total_energy_today
            name: Total Today
            icon: mdi:lightning-bolt
          - type: entity
            entity: sensor.total_energy_this_month
            name: Total This Month
            icon: mdi:lightning-bolt-circle
          - type: entity
            entity: sensor.daily_average_energy_this_month
            name: Daily Avg
            icon: mdi:chart-line

      # ── Today's kWh per device ──
      - type: entities
        title: Today's Energy Usage (kWh)
        show_header_toggle: false
        entities:
          - entity: sensor.tapo_p110m_1_today_s_consumption
            name: Desktop Desk
            icon: mdi:desktop-tower-monitor
          - entity: sensor.tapo_p110m_2_nursery_heater_today_s_consumption
            name: Nursery Heater
            icon: mdi:radiator
          - entity: sensor.tapo_p110m_3_today_s_consumption
            name: Dyson Heater
            icon: mdi:fan
          - entity: sensor.tapo_p110m_4_basement_heater_today_s_consumption
            name: Basement Heater
            icon: mdi:radiator

      # ── Device share of total (this month) ──
      - type: entities
        title: Device Share of Monthly Usage
        show_header_toggle: false
        entities:
          - entity: sensor.desktop_desk_plug_share_of_total
            name: Desktop Desk
            icon: mdi:desktop-tower-monitor
          - entity: sensor.nursery_heater_plug_share_of_total
            name: Nursery Heater
            icon: mdi:radiator
          - entity: sensor.dyson_heater_plug_share_of_total
            name: Dyson Heater
            icon: mdi:fan
          - entity: sensor.basement_heater_plug_share_of_total
            name: Basement Heater
            icon: mdi:radiator

      # ── Daily energy bar chart (30 days) ──
      - type: statistics-graph
        title: Daily Energy Usage – Last 30 Days
        period: day
        days_to_show: 30
        stat_types:
          - sum
        chart_type: bar
        entities:
          - entity: sensor.tapo_p110m_1_today_s_consumption
            name: Desktop
          - entity: sensor.tapo_p110m_2_nursery_heater_today_s_consumption
            name: Nursery Heater
          - entity: sensor.tapo_p110m_3_today_s_consumption
            name: Dyson Heater
          - entity: sensor.tapo_p110m_4_basement_heater_today_s_consumption
            name: Basement Heater

      # ── Weekly energy (line) ──
      - type: statistics-graph
        title: Weekly Energy Usage
        period: week
        stat_types:
          - sum
        chart_type: line
        entities:
          - entity: sensor.tapo_p110m_1_today_s_consumption
            name: Desktop
          - entity: sensor.tapo_p110m_2_nursery_heater_today_s_consumption
            name: Nursery Heater
          - entity: sensor.tapo_p110m_3_today_s_consumption
            name: Dyson Heater
          - entity: sensor.tapo_p110m_4_basement_heater_today_s_consumption
            name: Basement Heater

      # ── Monthly energy bar chart ──
      - type: statistics-graph
        title: Monthly Energy Usage (kWh)
        period: month
        stat_types:
          - sum
        chart_type: bar
        entities:
          - entity: sensor.tapo_p110m_1_this_month_s_consumption
            name: Desktop
          - entity: sensor.tapo_p110m_2_nursery_heater_this_month_s_consumption
            name: Nursery Heater
          - entity: sensor.tapo_p110m_3_this_month_s_consumption
            name: Dyson Heater
          - entity: sensor.tapo_p110m_4_basement_heater_this_month_s_consumption
            name: Basement Heater

  # ═══════════════════════════════════════════════════════════
  #  VIEW 5: DEVICES — detailed per-device drill-down
  # ═══════════════════════════════════════════════════════════
  - title: Devices
    path: devices
    icon: mdi:power-plug
    cards:
      # ── Desktop Desk Plug ──
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Desktop Desk Plug"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.tapo_p110m_1_current_consumption
                name: Power Now
                icon: mdi:flash
              - type: entity
                entity: sensor.tapo_p110m_1_today_s_consumption
                name: Today (kWh)
                icon: mdi:lightning-bolt
              - type: entity
                entity: sensor.desktop_desk_plug_energy_cost_today
                name: Cost Today
                icon: mdi:cash
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.tapo_p110m_1_this_month_s_consumption
                name: Month (kWh)
                icon: mdi:calendar
              - type: entity
                entity: sensor.desktop_desk_plug_energy_cost_monthly
                name: Cost Month
                icon: mdi:cash-multiple
              - type: entity
                entity: sensor.desktop_desk_plug_share_of_total
                name: Share
                icon: mdi:percent
          - type: history-graph
            hours_to_show: 48
            entities:
              - entity: sensor.tapo_p110m_1_current_consumption
                name: Power (W)

      # ── Nursery Heater Plug ──
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Nursery Heater Plug"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
                name: Power Now
                icon: mdi:flash
              - type: entity
                entity: sensor.tapo_p110m_2_nursery_heater_today_s_consumption
                name: Today (kWh)
                icon: mdi:lightning-bolt
              - type: entity
                entity: sensor.nursery_heater_plug_energy_cost_today
                name: Cost Today
                icon: mdi:cash
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.tapo_p110m_2_nursery_heater_this_month_s_consumption
                name: Month (kWh)
                icon: mdi:calendar
              - type: entity
                entity: sensor.nursery_heater_plug_energy_cost_monthly
