title: Energy Monitor
views:
  # ═══════════════════════════════════════════════════════════
  #  VIEW 1: OVERVIEW — at-a-glance energy summary
  # ═══════════════════════════════════════════════════════════
  - title: Overview
    path: overview
    icon: mdi:lightning-bolt
    type: panel
    # Background: the teal gradient is the fallback — it shows immediately.
    # Once you upload the power-towers photo to /config/www/energy-bg.jpg
    # the image overlays the gradient. Hard-refresh (Ctrl+Shift+R) after upload.
    background: "url('/local/energy-bg.jpg') center/cover no-repeat, linear-gradient(160deg, #071a28 0%, #030d10 60%, #0a1a10 100%)"
    cards:
      # Panel view: one top-level vertical-stack, full width.
      # horizontal-stacks inside become proper 3-column rows.
      - type: vertical-stack
        cards:

          # ══════════════════════════════════════════════════════
          #  SECTION HEADER — energy monitor
          # ══════════════════════════════════════════════════════
          - type: custom:button-card
            show_name: true
            show_state: false
            show_icon: true
            icon: mdi:lightning-bolt-circle
            name: energy monitor
            tap_action:
              action: none
            hold_action:
              action: none
            styles:
              card:
                - background: transparent
                - box-shadow: none
                - border-radius: "0"
                - padding: "6px 8px 4px"
                - border-bottom: "1px solid #00b4ab"
                - margin-bottom: "4px"
              grid:
                - grid-template-areas: '"i n"'
                - grid-template-columns: "min-content 1fr"
                - grid-template-rows: min-content
              icon:
                - color: "#00b4ab"
                - width: "15px"
                - margin-right: "6px"
              name:
                - text-transform: lowercase
                - letter-spacing: "3px"
                - font-size: "11px"
                - color: "var(--secondary-text-color)"
                - text-align: left
                - justify-self: start

          # ══════════════════════════════════════════════════════
          #  TOP ROW: PECO Rate | Energy Distribution | Costs
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Top Left: PECO Rate — gradient banner + styled table ──
              - type: markdown
                card_mod:
                  style: |
                    ha-card {
                      background: var(--ha-card-background, var(--card-background-color));
                      border-radius: 16px;
                      box-shadow: none;
                      height: 100%;
                    }
                content: |

                  **PECO Rate: ${{ states('sensor.peco_variable_rate') }}/kWh**

                  Last bill: **${{ states('input_number.peco_last_bill_amount') }}** for **{{ states('input_number.peco_last_bill_kwh') | int }} kWh** ({{ states('input_number.peco_last_bill_days') | int }} days)

                  <table style="width:100%;border-collapse:collapse;margin-top:8px;font-size:0.88em;">
                    <thead>
                      <tr style="background:linear-gradient(90deg,#00b4ab,#6b2fa0);">
                        <th style="color:white;padding:6px 8px;text-align:left;font-weight:600;">Component</th>
                        <th style="color:white;padding:6px 8px;text-align:right;font-weight:600;">Rate</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);">Delivery</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:var(--primary-color);">${{ states('input_number.peco_delivery_rate') }}/kWh</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);">Supply</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:var(--primary-color);">${{ states('input_number.peco_supply_rate') }}/kWh</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);">Transmission</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:var(--primary-color);">${{ states('input_number.peco_transmission_rate') }}/kWh</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;">Customer charge</td>
                        <td style="padding:5px 8px;text-align:right;color:var(--primary-color);">${{ states('input_number.peco_customer_charge') }}/mo fixed</td>
                      </tr>
                    </tbody>
                  </table>

              # ── Top Middle: Energy Distribution ──
              - type: energy-distribution
                title: Energy Distribution
                card_mod:
                  style: |
                    ha-card {
                      min-height: 310px;
                      display: flex;
                      flex-direction: column;
                      justify-content: center;
                    }

              # ── Top Right: 6-block cost summary ──
              - type: vertical-stack
                cards:
                  - type: horizontal-stack
                    cards:
                      - type: entity
                        entity: sensor.total_power_draw_now
                        name: Live Power
                        icon: mdi:flash
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 150px;
                            }
                      - type: entity
                        entity: sensor.total_energy_cost_today
                        name: Cost Today
                        icon: mdi:currency-usd
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 150px;
                            }
                      - type: entity
                        entity: sensor.total_energy_cost_monthly
                        name: Cost This Month
                        icon: mdi:calendar-month
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 150px;
                            }
                  - type: horizontal-stack
                    cards:
                      - type: entity
                        entity: sensor.projected_monthly_energy_cost
                        name: Projected Bill
                        icon: mdi:chart-line-variant
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 150px;
                            }
                      - type: entity
                        entity: sensor.daily_average_energy_cost_this_month
                        name: Daily Avg Cost
                        icon: mdi:chart-bar
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 150px;
                            }
                      - type: entity
                        entity: sensor.estimated_annual_energy_cost
                        name: Est. Annual
                        icon: mdi:calendar-clock
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 150px;
                            }

          # ══════════════════════════════════════════════════════
          #  SECTION HEADER — power (live wattage)
          # ══════════════════════════════════════════════════════
          - type: custom:button-card
            entity: sensor.total_power_draw_now
            show_name: true
            show_state: true
            show_icon: true
            icon: mdi:flash
            name: power
            tap_action:
              action: none
            hold_action:
              action: none
            styles:
              card:
                - background: transparent
                - box-shadow: none
                - border-radius: "0"
                - padding: "10px 8px 4px"
                - border-bottom: "1px solid #e74c3c"
                - margin-bottom: "4px"
              grid:
                - grid-template-areas: '"i n s"'
                - grid-template-columns: "min-content 1fr min-content"
                - grid-template-rows: min-content
              icon:
                - color: "#e74c3c"
                - width: "15px"
                - margin-right: "6px"
              name:
                - text-transform: lowercase
                - letter-spacing: "3px"
                - font-size: "11px"
                - color: "var(--secondary-text-color)"
                - text-align: left
                - justify-self: start
              state:
                - font-size: "13px"
                - font-weight: "600"
                - color: "var(--primary-text-color)"
                - justify-self: end

          # ══════════════════════════════════════════════════════
          #  BOTTOM ROW: Gauges | Power Graph | Device Charts
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Bottom Left: 4 real-time power gauges (card-mod styled) ──
              - type: vertical-stack
                cards:
                  - type: horizontal-stack
                    cards:
                      - type: conditional
                        conditions:
                          - entity: input_boolean.show_device_desktop
                            state: "on"
                        card:
                          type: gauge
                          entity: sensor.tapo_p110m_1_current_consumption
                          name: Desktop
                          unit: W
                          min: 0
                          max: 500
                          needle: true
                          severity:
                            green: 0
                            yellow: 150
                            red: 350
                          card_mod:
                            style: |
                              ha-card {
                                background: var(--ha-card-background, var(--card-background-color));
                                border-radius: 16px;
                                box-shadow: none;
                              }
                      - type: conditional
                        conditions:
                          - entity: input_boolean.show_device_nursery
                            state: "on"
                        card:
                          type: gauge
                          entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
                          name: Nursery Heater
                          unit: W
                          min: 0
                          max: 1500
                          needle: true
                          severity:
                            green: 0
                            yellow: 500
                            red: 1000
                          card_mod:
                            style: |
                              ha-card {
                                background: var(--ha-card-background, var(--card-background-color));
                                border-radius: 16px;
                                box-shadow: none;
                              }
                  - type: horizontal-stack
                    cards:
                      - type: conditional
                        conditions:
                          - entity: input_boolean.show_device_dyson
                            state: "on"
                        card:
                          type: gauge
                          entity: sensor.tapo_p110m_3_current_consumption
                          name: Dyson Heater
                          unit: W
                          min: 0
                          max: 2000
                          needle: true
                          severity:
                            green: 0
                            yellow: 500
                            red: 1200
                          card_mod:
                            style: |
                              ha-card {
                                background: var(--ha-card-background, var(--card-background-color));
                                border-radius: 16px;
                                box-shadow: none;
                              }
                      - type: conditional
                        conditions:
                          - entity: input_boolean.show_device_basement
                            state: "on"
                        card:
                          type: gauge
                          entity: sensor.tapo_p110m_4_basement_heater_current_consumption
                          name: Basement Heater
                          unit: W
                          min: 0
                          max: 1500
                          needle: true
                          severity:
                            green: 0
                            yellow: 500
                            red: 1000
                          card_mod:
                            style: |
                              ha-card {
                                background: var(--ha-card-background, var(--card-background-color));
                                border-radius: 16px;
                                box-shadow: none;
                              }
                  - type: horizontal-stack
                    cards:
                      - type: conditional
                        conditions:
                          - entity: input_boolean.show_device_guest_bedroom
                            state: "on"
                        card:
                          type: gauge
                          entity: sensor.guest_bedroom_desk_plug_current_consumption
                          name: Guest Bedroom
                          unit: W
                          min: 0
                          max: 1500
                          needle: true
                          severity:
                            green: 0
                            yellow: 200
                            red: 800
                          card_mod:
                            style: |
                              ha-card {
                                background: var(--ha-card-background, var(--card-background-color));
                                border-radius: 16px;
                                box-shadow: none;
                              }

              # ── Bottom Middle: Daily energy by device (14 days) ──
              - type: statistics-graph
                title: Daily Energy by Device (kWh)
                period: day
                days_to_show: 14
                stat_types:
                  - sum
                chart_type: bar
                entities:
                  - entity: sensor.tapo_p110m_1_today_s_consumption
                    name: Desktop
                  - entity: sensor.tapo_p110m_2_nursery_heater_today_s_consumption
                    name: Nursery Heater
                  - entity: sensor.tapo_p110m_3_today_s_consumption
                    name: Dyson Heater
                  - entity: sensor.tapo_p110m_4_basement_heater_today_s_consumption
                    name: Basement Heater
                  - entity: sensor.tumble_dryer_energy_daily
                    name: Tumble Dryer
                  - entity: sensor.guest_bedroom_desk_plug_today_s_consumption
                    name: Guest Bedroom

              # ── Bottom Right: Individual device usage ──
              - type: energy-devices-graph
                title: Individual Devices Total Usage

          # ══════════════════════════════════════════════════════
          #  POWER ROW 2: Per-device history (24h + 7 days)
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:
              - type: history-graph
                title: Power Draw by Device (24h)
                hours_to_show: 24
                entities:
                  - entity: sensor.tapo_p110m_1_current_consumption
                    name: Desktop
                  - entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
                    name: Nursery Heater
                  - entity: sensor.tapo_p110m_3_current_consumption
                    name: Dyson Heater
                  - entity: sensor.tapo_p110m_4_basement_heater_current_consumption
                    name: Basement Heater
                  - entity: sensor.guest_bedroom_desk_plug_current_consumption
                    name: Guest Bedroom
              - type: history-graph
                title: Power Draw by Device (7 Days)
                hours_to_show: 168
                entities:
                  - entity: sensor.tapo_p110m_1_current_consumption
                    name: Desktop
                  - entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
                    name: Nursery Heater
                  - entity: sensor.tapo_p110m_3_current_consumption
                    name: Dyson Heater
                  - entity: sensor.tapo_p110m_4_basement_heater_current_consumption
                    name: Basement Heater
                  - entity: sensor.guest_bedroom_desk_plug_current_consumption
                    name: Guest Bedroom

          # ══════════════════════════════════════════════════════
          #  SECTION HEADER — cost (purple)
          # ══════════════════════════════════════════════════════
          - type: custom:button-card
            entity: sensor.total_energy_cost_monthly
            show_name: true
            show_state: true
            show_icon: true
            icon: mdi:currency-usd
            name: cost
            tap_action:
              action: none
            hold_action:
              action: none
            styles:
              card:
                - background: transparent
                - box-shadow: none
                - border-radius: "0"
                - padding: "10px 8px 4px"
                - border-bottom: "1px solid #9b59b6"
                - margin-bottom: "4px"
              grid:
                - grid-template-areas: '"i n s"'
                - grid-template-columns: "min-content 1fr min-content"
                - grid-template-rows: min-content
              icon:
                - color: "#9b59b6"
                - width: "15px"
                - margin-right: "6px"
              name:
                - text-transform: lowercase
                - letter-spacing: "3px"
                - font-size: "11px"
                - color: "var(--secondary-text-color)"
                - text-align: left
                - justify-self: start
              state:
                - font-size: "13px"
                - font-weight: "600"
                - color: "var(--primary-text-color)"
                - justify-self: end

          # ══════════════════════════════════════════════════════
          #  COST ROW 1: Est. daily cost | 30-day cost trend
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Cost Left: Estimated daily cost per device (template math) ──
              - type: markdown
                card_mod:
                  style: |
                    ha-card {
                      background: var(--ha-card-background, var(--card-background-color));
                      border-radius: 16px;
                      box-shadow: none;
                    }
                content: |
                  {%- set cs = states('input_number.billing_cycle_start_day')|int(1) -%}
                  {%- set today = now().day -%}
                  {%- set cycle_days = [(today - cs + 1), 1]|max if today >= cs else [(today + 30 - cs + 1), 1]|max -%}
                  {%- set rate = states('sensor.peco_variable_rate')|float(0) -%}
                  {%- set suffix = 'st' if cs in [1,21] else ('nd' if cs in [2,22] else ('rd' if cs in [3,23] else 'th')) -%}
                  {%- set dryer_kwh = states('sensor.tumble_dryer_energy_monthly')|float(0) -%}
                  {%- set guest_kwh = states('sensor.guest_bedroom_desk_plug_this_month_s_consumption')|float(0) -%}
                  #### Estimated Daily Cost per Device

                  Billing cycle starts **{{ cs }}{{ suffix }}** each month · **{{ cycle_days }} day{{ 's' if cycle_days != 1 }}** elapsed · Rate: **${{ rate }}/kWh**

                  <table style="width:100%;border-collapse:collapse;margin-top:8px;font-size:0.88em;">
                    <thead>
                      <tr style="background:linear-gradient(90deg,#9b59b6,#6b2fa0);">
                        <th style="color:white;padding:6px 8px;text-align:left;font-weight:600;">Device</th>
                        <th style="color:white;padding:6px 8px;text-align:right;font-weight:600;">kWh/cycle</th>
                        <th style="color:white;padding:6px 8px;text-align:right;font-weight:600;">kWh/day</th>
                        <th style="color:white;padding:6px 8px;text-align:right;font-weight:600;">$/day est.</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);"><strong>Desktop</strong></td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;">{{ states('sensor.tapo_p110m_1_this_month_s_consumption')|float(0)|round(2) }} kWh</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;">{{ (states('sensor.tapo_p110m_1_this_month_s_consumption')|float(0) / cycle_days)|round(3) }}</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:#f39c12;">${{ ((states('sensor.tapo_p110m_1_this_month_s_consumption')|float(0) / cycle_days) * rate)|round(3) }}</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);"><strong>Nursery Heater</strong></td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;">{{ states('sensor.tapo_p110m_2_nursery_heater_this_month_s_consumption')|float(0)|round(2) }} kWh</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;">{{ (states('sensor.tapo_p110m_2_nursery_heater_this_month_s_consumption')|float(0) / cycle_days)|round(3) }}</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:#3498db;">${{ ((states('sensor.tapo_p110m_2_nursery_heater_this_month_s_consumption')|float(0) / cycle_days) * rate)|round(3) }}</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);"><strong>Dyson Heater</strong></td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;">{{ states('sensor.tapo_p110m_3_this_month_s_consumption')|float(0)|round(2) }} kWh</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;">{{ (states('sensor.tapo_p110m_3_this_month_s_consumption')|float(0) / cycle_days)|round(3) }}</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:#2ecc71;">${{ ((states('sensor.tapo_p110m_3_this_month_s_consumption')|float(0) / cycle_days) * rate)|round(3) }}</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);"><strong>Basement Heater</strong></td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;">{{ states('sensor.tapo_p110m_4_basement_heater_this_month_s_consumption')|float(0)|round(2) }} kWh</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;">{{ (states('sensor.tapo_p110m_4_basement_heater_this_month_s_consumption')|float(0) / cycle_days)|round(3) }}</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:#e74c3c;">${{ ((states('sensor.tapo_p110m_4_basement_heater_this_month_s_consumption')|float(0) / cycle_days) * rate)|round(3) }}</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);"><strong>Tumble Dryer</strong></td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;">{{ dryer_kwh|round(2) }} kWh</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;">{{ (dryer_kwh / cycle_days)|round(3) }}</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:#9b59b6;">${{ ((dryer_kwh / cycle_days) * rate)|round(3) }}</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);"><strong>Guest Bedroom</strong></td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;">{{ guest_kwh|round(2) }} kWh</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;">{{ (guest_kwh / cycle_days)|round(3) }}</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:#1abc9c;">${{ ((guest_kwh / cycle_days) * rate)|round(3) }}</td>
                      </tr>
                      <tr style="font-weight:600;">
                        <td style="padding:5px 8px;">Total</td>
                        <td style="padding:5px 8px;text-align:right;">{{ states('sensor.total_energy_this_month')|float(0)|round(2) }} kWh</td>
                        <td style="padding:5px 8px;text-align:right;">{{ (states('sensor.total_energy_this_month')|float(0) / cycle_days)|round(3) }}</td>
                        <td style="padding:5px 8px;text-align:right;color:var(--primary-color);">${{ states('sensor.daily_average_energy_cost_this_month') }}</td>
                      </tr>
                    </tbody>
                  </table>

              # ── Cost Right: 30-day per-device energy trend ──
              # Uses kWh sensors (have existing statistics). Cost sensors need
              # ~24h after HA restart before statistics accumulate — swap once ready.
              - type: statistics-graph
                title: 30-Day Energy Trend by Device (kWh)
                period: day
                days_to_show: 30
                stat_types:
                  - sum
                chart_type: line
                entities:
                  - entity: sensor.tapo_p110m_1_today_s_consumption
                    name: Desktop
                  - entity: sensor.tapo_p110m_2_nursery_heater_today_s_consumption
                    name: Nursery Heater
                  - entity: sensor.tapo_p110m_3_today_s_consumption
                    name: Dyson Heater
                  - entity: sensor.tapo_p110m_4_basement_heater_today_s_consumption
                    name: Basement Heater
                  - entity: sensor.tumble_dryer_energy_daily
                    name: Tumble Dryer
                  - entity: sensor.guest_bedroom_desk_plug_today_s_consumption
                    name: Guest Bedroom

          # ══════════════════════════════════════════════════════
          #  COST ROW 2: This billing cycle | Today's costs
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Cost Left: This billing cycle breakdown ──
              - type: entities
                title: This Billing Cycle's Energy Costs
                show_header_toggle: false
                entities:
                  - entity: sensor.desktop_desk_plug_energy_cost_monthly
                    name: Desktop Desk
                    icon: mdi:desktop-tower-monitor
                  - entity: sensor.nursery_heater_plug_energy_cost_monthly
                    name: Nursery Heater
                    icon: mdi:radiator
                  - entity: sensor.dyson_heater_plug_energy_cost_monthly
                    name: Dyson Heater
                    icon: mdi:fan
                  - entity: sensor.basement_heater_plug_energy_cost_monthly
                    name: Basement Heater
                    icon: mdi:radiator
                  - entity: sensor.tumble_dryer_energy_cost_monthly
                    name: Tumble Dryer
                    icon: mdi:tumble-dryer
                  - entity: sensor.guest_bedroom_desk_plug_energy_cost_monthly
                    name: Guest Bedroom
                    icon: mdi:desk
                  - type: divider
                  - entity: sensor.total_energy_cost_monthly
                    name: Total This Month
                    icon: mdi:sigma

              # ── Cost Right: Today's breakdown ──
              - type: entities
                title: Today's Energy Costs
                show_header_toggle: false
                entities:
                  - entity: sensor.desktop_desk_plug_energy_cost_today
                    name: Desktop Desk
                    icon: mdi:desktop-tower-monitor
                  - entity: sensor.nursery_heater_plug_energy_cost_today
                    name: Nursery Heater
                    icon: mdi:radiator
                  - entity: sensor.dyson_heater_plug_energy_cost_today
                    name: Dyson Heater
                    icon: mdi:fan
                  - entity: sensor.basement_heater_plug_energy_cost_today
                    name: Basement Heater
                    icon: mdi:radiator
                  - entity: sensor.tumble_dryer_energy_cost_today
                    name: Tumble Dryer
                    icon: mdi:tumble-dryer
                  - entity: sensor.guest_bedroom_desk_plug_energy_cost_today
                    name: Guest Bedroom
                    icon: mdi:desk
                  - type: divider
                  - entity: sensor.total_energy_cost_today
                    name: Total Today
                    icon: mdi:sigma

          # ══════════════════════════════════════════════════════
          #  SECTION HEADER — usage (green)
          # ══════════════════════════════════════════════════════
          - type: custom:button-card
            entity: sensor.total_energy_this_month
            show_name: true
            show_state: true
            show_icon: true
            icon: mdi:chart-bar
            name: usage
            tap_action:
              action: none
            hold_action:
              action: none
            styles:
              card:
                - background: transparent
                - box-shadow: none
                - border-radius: "0"
                - padding: "10px 8px 4px"
                - border-bottom: "1px solid #27ae60"
                - margin-bottom: "4px"
              grid:
                - grid-template-areas: '"i n s"'
                - grid-template-columns: "min-content 1fr min-content"
                - grid-template-rows: min-content
              icon:
                - color: "#27ae60"
                - width: "15px"
                - margin-right: "6px"
              name:
                - text-transform: lowercase
                - letter-spacing: "3px"
                - font-size: "11px"
                - color: "var(--secondary-text-color)"
                - text-align: left
                - justify-self: start
              state:
                - font-size: "13px"
                - font-weight: "600"
                - color: "var(--primary-text-color)"
                - justify-self: end

          # ══════════════════════════════════════════════════════
          #  USAGE ROW: kWh stats | Daily bar 30d | Monthly bar
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Usage Left: kWh summary stats ──
              - type: vertical-stack
                cards:
                  - type: entity
                    entity: sensor.total_energy_today
                    name: Total Today
                    icon: mdi:lightning-bolt
                    card_mod:
                      style: |
                        ha-card {
                          background: var(--ha-card-background, var(--card-background-color));
                          border-radius: 16px;
                          box-shadow: none;
                        }
                  - type: entity
                    entity: sensor.total_energy_this_month
                    name: Total This Month
                    icon: mdi:lightning-bolt-circle
                    card_mod:
                      style: |
                        ha-card {
                          background: var(--ha-card-background, var(--card-background-color));
                          border-radius: 16px;
                          box-shadow: none;
                        }
                  - type: entity
                    entity: sensor.daily_average_energy_this_month
                    name: Daily Avg kWh
                    icon: mdi:chart-line
                    card_mod:
                      style: |
                        ha-card {
                          background: var(--ha-card-background, var(--card-background-color));
                          border-radius: 16px;
                          box-shadow: none;
                        }

              # ── Usage Middle: Daily energy bar chart (last 30 days) ──
              - type: statistics-graph
                title: Daily Energy Usage – Last 30 Days
                period: day
                days_to_show: 30
                stat_types:
                  - sum
                chart_type: bar
                entities:
                  - entity: sensor.tapo_p110m_1_today_s_consumption
                    name: Desktop
                  - entity: sensor.tapo_p110m_2_nursery_heater_today_s_consumption
                    name: Nursery Heater
                  - entity: sensor.tapo_p110m_3_today_s_consumption
                    name: Dyson Heater
                  - entity: sensor.tapo_p110m_4_basement_heater_today_s_consumption
                    name: Basement Heater
                  - entity: sensor.guest_bedroom_desk_plug_today_s_consumption
                    name: Guest Bedroom

              # ── Usage Right: Monthly energy bar chart ──
              - type: statistics-graph
                title: Monthly Energy Usage (kWh)
                period: month
                stat_types:
                  - sum
                chart_type: bar
                entities:
                  - entity: sensor.tapo_p110m_1_this_month_s_consumption
                    name: Desktop
                  - entity: sensor.tapo_p110m_2_nursery_heater_this_month_s_consumption
                    name: Nursery Heater
                  - entity: sensor.tapo_p110m_3_this_month_s_consumption
                    name: Dyson Heater
                  - entity: sensor.tapo_p110m_4_basement_heater_this_month_s_consumption
                    name: Basement Heater
                  - entity: sensor.guest_bedroom_desk_plug_this_month_s_consumption
                    name: Guest Bedroom
