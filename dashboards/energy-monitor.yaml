                    name: "7d"
                    show_name: true
                    show_icon: false
                    show_state: false
                    tap_action:
                      action: call-service
                      service: input_boolean.turn_on
                      service_data:
                        entity_id: input_boolean.power_draw_7d_view
                    state:
                      - value: "on"
                        styles:
                          card:
                            - background: "linear-gradient(135deg, #00b4ab, #6b2fa0)"
                          name:
                            - color: "white"
                    styles:
                      card:
                        - background: "var(--ha-card-background, var(--card-background-color))"
                        - border-radius: "0 16px 0 0"
                        - box-shadow: none
                        - padding: "8px 0"
                        - border-bottom: "1px solid var(--divider-color)"
                      name:
                        - font-size: "12px"
                        - font-weight: "600"
                        - letter-spacing: "2px"
                        - color: "var(--secondary-text-color)"
                        - text-transform: uppercase
              # ── 24h view (shown when power_draw_7d_view = off) ──
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_boolean.power_draw_7d_view
                    state: "off"
                card:
                  type: custom:apexcharts-card
                  graph_span: 24h
                  span:
                    end: day
                  update_interval: 5m
                  header:
                    title: "Avg Power Draw by Device (W) — 24h"
                    show: true
                    show_states: false
                  card_mod:
                    style: |
                      ha-card {
                        background: var(--ha-card-background, var(--card-background-color));
                        border-radius: 0 0 16px 16px;
                        box-shadow: none;
                        margin-top: -1px;
                        min-height: 290px;
                      }
                  apex_config:
                    chart:
                      stacked: true
                    stroke:
                      curve: smooth
                      width: 2
                    fill:
                      type: solid
                      opacity: 0.75
                    legend:
                      show: true
                      position: bottom
                      horizontalAlign: center
                      fontSize: "11px"
                      itemMargin:
                        horizontal: 8
                        vertical: 3
                      markers:
                        width: 8
                        height: 8
                  series:
                    - entity: sensor.tapo_p110m_1_current_consumption
                      name: Desktop
                      type: area
                      color: "#f39c12"
                      statistics:
                        type: mean
                        period: hour
                      group_by:
                        func: avg
                        duration: 1h
                    - entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
                      name: Nursery Heater
                      type: area
                      color: "#3498db"
                      statistics:
                        type: mean
                        period: hour
                      group_by:
                        func: avg
                        duration: 1h
                    - entity: sensor.tapo_p110m_3_current_consumption
                      name: Dyson Heater
                      type: area
                      color: "#2ecc71"
                      statistics:
                        type: mean
                        period: hour
                      group_by:
                        func: avg
                        duration: 1h
                    - entity: sensor.tapo_p110m_4_basement_heater_current_consumption
                      name: Basement Heater
                      type: area
                      color: "#e74c3c"
                      statistics:
                        type: mean
                        period: hour
                      group_by:
                        func: avg
                        duration: 1h
                    - entity: sensor.guest_bedroom_desk_plug_current_consumption
                      name: Guest Bedroom
                      type: area
                      color: "#1abc9c"
                      statistics:
                        type: mean
                        period: hour
                      group_by:
                        func: avg
                        duration: 1h
              # ── 7d view (shown when power_draw_7d_view = on) ──
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_boolean.power_draw_7d_view
                    state: "on"
                card:
                  type: custom:apexcharts-card
                  graph_span: 7d
                  span:
                    end: day
                  update_interval: 5m
                  header:
                    title: "Avg Power Draw by Device (W) — 7d"
                    show: true
                    show_states: false
                  card_mod:
                    style: |
                      ha-card {
                        background: var(--ha-card-background, var(--card-background-color));
                        border-radius: 0 0 16px 16px;
                        box-shadow: none;
                        margin-top: -1px;
                        min-height: 290px;
                      }
                  apex_config:
                    chart:
                      stacked: true
                    stroke:
                      curve: smooth
                      width: 2
                    fill:
                      type: solid
                      opacity: 0.75
                    legend:
                      show: true
                      position: bottom
                      horizontalAlign: center
                      fontSize: "11px"
                      itemMargin:
                        horizontal: 8
                        vertical: 3
                      markers:
                        width: 8
                        height: 8
                  series:
                    - entity: sensor.tapo_p110m_1_current_consumption
                      name: Desktop
                      type: area
                      color: "#f39c12"
                      statistics:
                        type: mean
                        period: day
                      group_by:
                        func: avg
                        duration: 1d
                    - entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
                      name: Nursery Heater
                      type: area
                      color: "#3498db"
                      statistics:
                        type: mean
                        period: day
                      group_by:
                        func: avg
                        duration: 1d
                    - entity: sensor.tapo_p110m_3_current_consumption
                      name: Dyson Heater
                      type: area
                      color: "#2ecc71"
                      statistics:
                        type: mean
                        period: day
                      group_by:
                        func: avg
                        duration: 1d
                    - entity: sensor.tapo_p110m_4_basement_heater_current_consumption
                      name: Basement Heater
                      type: area
                      color: "#e74c3c"
                      statistics:
                        type: mean
                        period: day
                      group_by:
                        func: avg
                        duration: 1d
                    - entity: sensor.guest_bedroom_desk_plug_current_consumption
                      name: Guest Bedroom
                      type: area
                      color: "#1abc9c"
                      statistics:
                        type: mean
                        period: day
                      group_by:
                        func: avg
                        duration: 1d

          # ══════════════════════════════════════════════════════
          #  SECTION HEADER — cost (purple)
          # ══════════════════════════════════════════════════════
          - type: custom:button-card
            entity: sensor.total_energy_cost_monthly
            show_name: true
            show_state: true
            show_icon: true
            icon: mdi:currency-usd
            name: cost
            tap_action:
              action: none
            hold_action:
              action: none
            styles:
              card:
                - background: transparent
                - box-shadow: none
                - border-radius: "0"
                - padding: "10px 8px 4px"
                - border-bottom: "1px solid #9b59b6"
                - margin-bottom: "4px"
              grid:
                - grid-template-areas: '"i n s"'
                - grid-template-columns: "min-content 1fr min-content"
                - grid-template-rows: min-content
              icon:
                - color: "#9b59b6"
                - width: "15px"
                - margin-right: "6px"
              name:
                - text-transform: lowercase
                - letter-spacing: "3px"
                - font-size: "11px"
                - color: "var(--secondary-text-color)"
                - text-align: left
                - justify-self: start
              state:
                - font-size: "13px"
                - font-weight: "600"
                - color: "var(--primary-text-color)"
                - justify-self: end

          # ══════════════════════════════════════════════════════
          #  COST ROW 1: Daily cost + avg power draw — 30-Day
          # Stacked bars (left axis)  = per-device daily cost ($)
          # Dashed lines (right axis) = per-device daily avg power (W)
          # Cost uses max of the accumulating *_energy_cost_today sensor
          # (daily max = end-of-day total).  Tumble Dryer has no power
          # sensor so it only contributes a cost bar.
          # ══════════════════════════════════════════════════════
          - type: custom:apexcharts-card
            graph_span: 30d
            span:
              end: day
            header:
              title: "Daily Cost & Avg Power Draw - 30 Days"
              show: true
              show_states: false
            card_mod:
              style: |
                ha-card {
                  background: var(--ha-card-background, var(--card-background-color));
                  border-radius: 16px;
                  box-shadow: none;
                }
            apex_config:
              chart:
                stacked: true
              subtitle:
                text: "bars = daily cost ($)  ·  dotted lines = avg power (W)"
                align: center
                style:
                  fontSize: "10px"
                  color: "var(--secondary-text-color)"
              legend:
                show: true
                position: bottom
                horizontalAlign: center
                fontSize: "11px"
                itemMargin:
                  horizontal: 8
                  vertical: 3
                markers:
                  width: 8
                  height: 8
              yaxis:
                - id: cost
                  title:
                    text: "Daily Cost ($)"
                  min: 0
                  labels:
                    formatter: |
                      EVAL:function(val) { return '$' + val.toFixed(2); }
                - id: power
                  opposite: true
                  title:
                    text: "Avg Power (W)"
                  min: 0
                  labels:
                    formatter: |
                      EVAL:function(val) { return Math.round(val) + ' W'; }
            series:
              # ── Cost bars (left axis, stacked) ──
              - entity: sensor.desktop_desk_plug_energy_cost_today
                name: "Desktop $"
                yaxis_id: cost
                type: column
                color: "#f39c12"
                statistics:
                  type: max
                  period: day
                group_by:
                  func: max
                  duration: 1d
              - entity: sensor.nursery_heater_plug_energy_cost_today
                name: "Nursery Heater $"
                yaxis_id: cost
                type: column
                color: "#3498db"
                statistics:
                  type: max
                  period: day
                group_by:
                  func: max
                  duration: 1d
              - entity: sensor.dyson_heater_plug_energy_cost_today
                name: "Dyson Heater $"
                yaxis_id: cost
                type: column
                color: "#2ecc71"
                statistics:
                  type: max
                  period: day
                group_by:
                  func: max
                  duration: 1d
              - entity: sensor.basement_heater_plug_energy_cost_today
                name: "Basement Heater $"
                yaxis_id: cost
                type: column
                color: "#e74c3c"
                statistics:
                  type: max
                  period: day
                group_by:
                  func: max
                  duration: 1d
              - entity: sensor.tumble_dryer_energy_cost_today
                name: "Tumble Dryer $"
                yaxis_id: cost
                type: column
                color: "#9b59b6"
                statistics:
                  type: max
                  period: day
                group_by:
                  func: max
                  duration: 1d
              - entity: sensor.guest_bedroom_desk_plug_energy_cost_today
                name: "Guest Bedroom $"
                yaxis_id: cost
                type: column
                color: "#1abc9c"
                statistics:
                  type: max
                  period: day
                group_by:
                  func: max
                  duration: 1d
              # ── Avg power draw lines (right axis, dashed) ──
              - entity: sensor.tapo_p110m_1_current_consumption
                name: "Desktop W"
                yaxis_id: power
                type: line
                color: "#f39c12"
                opacity: 0.7
                stroke_width: 2
                stroke_dash: 4
                statistics:
                  type: mean
                  period: day
                group_by:
                  func: avg
                  duration: 1d
              - entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
                name: "Nursery Heater W"
                yaxis_id: power
                type: line
                color: "#3498db"
                opacity: 0.7
                stroke_width: 2
                stroke_dash: 4
                statistics:
                  type: mean
                  period: day
                group_by:
                  func: avg
                  duration: 1d
              - entity: sensor.tapo_p110m_3_current_consumption
                name: "Dyson Heater W"
                yaxis_id: power
                type: line
                color: "#2ecc71"
                opacity: 0.7
                stroke_width: 2
                stroke_dash: 4
                statistics:
                  type: mean
                  period: day
                group_by:
                  func: avg
                  duration: 1d
              - entity: sensor.tapo_p110m_4_basement_heater_current_consumption
                name: "Basement Heater W"
                yaxis_id: power
                type: line
                color: "#e74c3c"
                opacity: 0.7
                stroke_width: 2
                stroke_dash: 4
                statistics:
                  type: mean
                  period: day
                group_by:
                  func: avg
                  duration: 1d
              - entity: sensor.guest_bedroom_desk_plug_current_consumption
                name: "Guest Bedroom W"
                yaxis_id: power
                type: line
                color: "#1abc9c"
                opacity: 0.7
                stroke_width: 2
                stroke_dash: 4
                statistics:
                  type: mean
                  period: day
                group_by:
                  func: avg
                  duration: 1d

          # ══════════════════════════════════════════════════════
          #  COST ROW 2: Today / Billing Cycle toggle + entity list
          # input_boolean.cost_view_today: on = Today, off = Billing Cycle
          # ══════════════════════════════════════════════════════
          - type: vertical-stack
            cards:
              # Tab bar: Today / Billing Cycle
              - type: horizontal-stack
                cards:
                  - type: custom:button-card
                    entity: input_boolean.cost_view_today
                    name: "Today"
                    show_name: true
                    show_icon: false
                    show_state: false
                    tap_action:
                      action: call-service
                      service: input_boolean.turn_on
                      service_data:
                        entity_id: input_boolean.cost_view_today
                    state:
                      - value: "on"
                        styles:
                          card:
                            - background: "linear-gradient(135deg, #00b4ab, #6b2fa0)"
                          name:
                            - color: "white"
                    styles:
                      card:
                        - background: "var(--ha-card-background, var(--card-background-color))"
                        - border-radius: "16px 0 0 0"
                        - box-shadow: none
                        - padding: "8px 0"
                        - border-bottom: "1px solid var(--divider-color)"
                      name:
                        - font-size: "12px"
                        - font-weight: "600"
                        - letter-spacing: "2px"
                        - color: "var(--secondary-text-color)"
                        - text-transform: uppercase
                  - type: custom:button-card
                    entity: input_boolean.cost_view_today
                    name: "Billing Cycle"
                    show_name: true
                    show_icon: false
                    show_state: false
                    tap_action:
                      action: call-service
                      service: input_boolean.turn_off
                      service_data:
                        entity_id: input_boolean.cost_view_today
                    state:
                      - value: "off"
                        styles:
                          card:
                            - background: "linear-gradient(135deg, #00b4ab, #6b2fa0)"
                          name:
                            - color: "white"
                    styles:
                      card:
                        - background: "var(--ha-card-background, var(--card-background-color))"
                        - border-radius: "0 16px 0 0"
                        - box-shadow: none
                        - padding: "8px 0"
                        - border-bottom: "1px solid var(--divider-color)"
                      name:
                        - font-size: "12px"
                        - font-weight: "600"
                        - letter-spacing: "2px"
                        - color: "var(--secondary-text-color)"
                        - text-transform: uppercase

              # ── Today's breakdown (shown when cost_view_today = on) ──
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_boolean.cost_view_today
                    state: "on"
                card:
                  type: entities
                  title: Today's Energy Costs
                  show_header_toggle: false
                  card_mod:
                    style: |
                      ha-card {
                        background: var(--ha-card-background, var(--card-background-color));
                        border-radius: 0 0 16px 16px;
                        box-shadow: none;
                        margin-top: -1px;
                      }
                  entities:
                    - entity: sensor.desktop_desk_plug_energy_cost_today
                      name: Desktop Desk
                      icon: mdi:desktop-tower-monitor
                    - entity: sensor.nursery_heater_plug_energy_cost_today
                      name: Nursery Heater
                      icon: mdi:radiator
                    - entity: sensor.dyson_heater_plug_energy_cost_today
                      name: Dyson Heater
                      icon: mdi:fan
                    - entity: sensor.basement_heater_plug_energy_cost_today
                      name: Basement Heater
                      icon: mdi:radiator
                    - entity: sensor.tumble_dryer_energy_cost_today
                      name: Tumble Dryer
                      icon: mdi:tumble-dryer
                    - entity: sensor.guest_bedroom_desk_plug_energy_cost_today
                      name: Guest Bedroom
                      icon: mdi:desk
                    - type: divider
                    - entity: sensor.total_energy_cost_today
                      name: Total Today
                      icon: mdi:sigma

              # ── Billing cycle breakdown (shown when cost_view_today = off) ──
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_boolean.cost_view_today
                    state: "off"
                card:
                  type: entities
                  title: This Billing Cycle's Energy Costs
                  show_header_toggle: false
                  card_mod:
                    style: |
                      ha-card {
                        background: var(--ha-card-background, var(--card-background-color));
                        border-radius: 0 0 16px 16px;
                        box-shadow: none;
                        margin-top: -1px;
                      }
                  entities:
                    - entity: sensor.desktop_desk_plug_energy_cost_monthly
                      name: Desktop Desk
                      icon: mdi:desktop-tower-monitor
                    - entity: sensor.nursery_heater_plug_energy_cost_monthly
                      name: Nursery Heater
                      icon: mdi:radiator
                    - entity: sensor.dyson_heater_plug_energy_cost_monthly
                      name: Dyson Heater
                      icon: mdi:fan
                    - entity: sensor.basement_heater_plug_energy_cost_monthly
                      name: Basement Heater
                      icon: mdi:radiator
                    - entity: sensor.tumble_dryer_energy_cost_monthly
                      name: Tumble Dryer
                      icon: mdi:tumble-dryer
                    - entity: sensor.guest_bedroom_desk_plug_energy_cost_monthly
                      name: Guest Bedroom
                      icon: mdi:desk
                    - type: divider
                    - entity: sensor.total_energy_cost_monthly
                      name: Total This Month
                      icon: mdi:sigma

          # ══════════════════════════════════════════════════════
          #  SECTION HEADER — usage (green)
          # ══════════════════════════════════════════════════════
          - type: custom:button-card
            entity: sensor.total_energy_this_month
            show_name: true
            show_state: true
            show_icon: true
            icon: mdi:chart-bar
            name: usage
            tap_action:
              action: none
            hold_action:
              action: none
            styles:
              card:
                - background: transparent
                - box-shadow: none
                - border-radius: "0"
                - padding: "10px 8px 4px"
                - border-bottom: "1px solid #27ae60"
                - margin-bottom: "4px"
              grid:
                - grid-template-areas: '"i n s"'
                - grid-template-columns: "min-content 1fr min-content"
                - grid-template-rows: min-content
              icon:
                - color: "#27ae60"
                - width: "15px"
                - margin-right: "6px"
              name:
                - text-transform: lowercase
                - letter-spacing: "3px"
                - font-size: "11px"
                - color: "var(--secondary-text-color)"
                - text-align: left
                - justify-self: start
              state:
                - font-size: "13px"
                - font-weight: "600"
                - color: "var(--primary-text-color)"
                - justify-self: end

          # ══════════════════════════════════════════════════════
          #  USAGE ROW: Monthly energy bar chart (full width)
          # ══════════════════════════════════════════════════════
          - type: statistics-graph
            title: Monthly Energy by Device (kWh)
            period: month
            stat_types:
              - sum
            chart_type: bar
            max_y_axis: 300
            entities:
              - entity: sensor.tapo_p110m_1_this_month_s_consumption
                name: Desktop
                color: "#f39c12"
              - entity: sensor.tapo_p110m_2_nursery_heater_this_month_s_consumption
                name: Nursery Heater
                color: "#3498db"
              - entity: sensor.tapo_p110m_3_this_month_s_consumption
                name: Dyson Heater
                color: "#2ecc71"
              - entity: sensor.tapo_p110m_4_basement_heater_this_month_s_consumption
                name: Basement Heater
                color: "#e74c3c"
              - entity: sensor.guest_bedroom_desk_plug_this_month_s_consumption
                name: Guest Bedroom
                color: "#1abc9c"
  # ═══════════════════════════════════════════════════════════
  #  VIEW 5: DEVICES — detailed per-device drill-down
  # ═══════════════════════════════════════════════════════════
  - title: Devices
    path: devices
    icon: mdi:power-plug
    cards:
      # ── Desktop Desk Plug ──
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Desktop Desk Plug"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.tapo_p110m_1_current_consumption
                name: Power Now
                icon: mdi:flash
              - type: entity
                entity: sensor.tapo_p110m_1_today_s_consumption
                name: Today (kWh)
                icon: mdi:lightning-bolt
              - type: entity
                entity: sensor.desktop_desk_plug_energy_cost_today
                name: Cost Today
                icon: mdi:cash
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.tapo_p110m_1_this_month_s_consumption
                name: Month (kWh)
                icon: mdi:calendar
              - type: entity
                entity: sensor.desktop_desk_plug_energy_cost_monthly
                name: Cost Month
                icon: mdi:cash-multiple
              - type: entity
                entity: sensor.desktop_desk_plug_share_of_total
                name: Share
                icon: mdi:percent
          - type: history-graph
            hours_to_show: 48
            entities:
