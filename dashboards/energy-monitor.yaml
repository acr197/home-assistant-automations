title: Energy Monitor
views:
  # ═══════════════════════════════════════════════════════════
  #  VIEW 1: OVERVIEW — at-a-glance energy summary
  # ═══════════════════════════════════════════════════════════
  - title: Overview
    path: overview
    icon: mdi:lightning-bolt
    type: panel
    cards:
      # Panel view only allows ONE top-level card, so everything
      # lives inside this single vertical-stack. Inside, each
      # horizontal-stack becomes a full-width row that evenly
      # divides its children into columns.
      - type: vertical-stack
        cards:

          # ══════════════════════════════════════════════════════
          #  TOP ROW: PECO Rate | Energy Distribution | Costs
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Top Left: PECO Rate — CSS gradient banner + styled HTML table ──
              - type: markdown
                content: |

                  **PECO Rate: ${{ states('sensor.peco_variable_rate') }}/kWh**

                  Last bill: **${{ states('input_number.peco_last_bill_amount') }}** for **{{ states('input_number.peco_last_bill_kwh') | int }} kWh** ({{ states('input_number.peco_last_bill_days') | int }} days)

                  <table style="width:100%;border-collapse:collapse;margin-top:8px;font-size:0.88em;">
                    <thead>
                      <tr style="background:linear-gradient(90deg,#00b4ab,#6b2fa0);">
                        <th style="color:white;padding:6px 8px;text-align:left;font-weight:600;">Component</th>
                        <th style="color:white;padding:6px 8px;text-align:right;font-weight:600;">Rate</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);">Delivery</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:var(--primary-color);">${{ states('input_number.peco_delivery_rate') }}/kWh</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);">Supply</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:var(--primary-color);">${{ states('input_number.peco_supply_rate') }}/kWh</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);">Transmission</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:var(--primary-color);">${{ states('input_number.peco_transmission_rate') }}/kWh</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;">Customer charge</td>
                        <td style="padding:5px 8px;text-align:right;color:var(--primary-color);">${{ states('input_number.peco_customer_charge') }}/mo fixed</td>
                      </tr>
                    </tbody>
                  </table>

              # ── Top Middle: Energy Distribution ──
              # Pulls from Settings → Dashboards → Energy config
              - type: energy-distribution
                title: Energy Distribution

              # ── Top Right: 6-block cost summary ──
              - type: vertical-stack
                cards:
                  - type: horizontal-stack
                    cards:
                      - type: entity
                        entity: sensor.total_power_draw_now
                        name: Live Power
                        icon: mdi:flash
                      - type: entity
                        entity: sensor.total_energy_cost_today
                        name: Cost Today
                        icon: mdi:currency-usd
                      - type: entity
                        entity: sensor.total_energy_cost_monthly
                        name: Cost This Month
                        icon: mdi:calendar-month
                  - type: horizontal-stack
                    cards:
                      - type: entity
                        entity: sensor.projected_monthly_energy_cost
                        name: Projected Bill
                        icon: mdi:chart-line-variant
                      - type: entity
                        entity: sensor.daily_average_energy_cost_this_month
                        name: Daily Avg Cost
                        icon: mdi:chart-bar
                      - type: entity
                        entity: sensor.estimated_annual_energy_cost
                        name: Est. Annual
                        icon: mdi:calendar-clock

          # ══════════════════════════════════════════════════════
          #  BOTTOM ROW: Gauges | Total Power Draw | Devices
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Bottom Left: 4 real-time power gauges ──
              - type: vertical-stack
                cards:
                  - type: horizontal-stack
                    cards:
                      - type: gauge
                        entity: sensor.tapo_p110m_1_current_consumption
                        name: Desktop
                        unit: W
                        min: 0
                        max: 500
                        needle: true
                        severity:
                          green: 0
                          yellow: 150
                          red: 350
                      - type: gauge
                        entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
                        name: Nursery Heater
                        unit: W
                        min: 0
                        max: 1500
                        needle: true
                        severity:
                          green: 0
                          yellow: 500
                          red: 1000
                  - type: horizontal-stack
                    cards:
                      - type: gauge
                        entity: sensor.tapo_p110m_3_current_consumption
                        name: Dyson Heater
                        unit: W
                        min: 0
                        max: 2000
                        needle: true
                        severity:
                          green: 0
                          yellow: 500
                          red: 1200
                      - type: gauge
                        entity: sensor.tapo_p110m_4_basement_heater_current_consumption
                        name: Basement Heater
                        unit: W
                        min: 0
                        max: 1500
                        needle: true
                        severity:
                          green: 0
                          yellow: 500
                          red: 1000

              # ── Bottom Middle: Total power draw history (24h) ──
              - type: history-graph
                title: Total Power Draw (24h)
                hours_to_show: 24
                entities:
                  - entity: sensor.total_power_draw_now
                    name: Total Watts

              # ── Bottom Right: Individual device usage + footer note ──
              # Both in a vertical-stack so the note aligns under the graph
              - type: vertical-stack
                cards:
                  - type: energy-devices-graph
                    title: Individual Devices Total Usage
                  - type: markdown
                    content: |
                      <small style="color: var(--secondary-text-color);">
                      To add or remove devices, go to **Settings → Dashboards → Energy → Individual devices**.
                      </small>

  # ═══════════════════════════════════════════════════════════
  #  VIEW 2: LIVE — real-time power by device
  # ═══════════════════════════════════════════════════════════
  - title: Live Power
    path: live
    icon: mdi:pulse
    cards:
      # ── Total draw ──
      - type: entity
        entity: sensor.total_power_draw_now
        name: Total Live Power Draw
        icon: mdi:flash-alert

      # ── Per-device power history (24h overlay) ──
      - type: history-graph
        title: Power Draw by Device (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.tapo_p110m_1_current_consumption
            name: Desktop
          - entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
            name: Nursery Heater
          - entity: sensor.tapo_p110m_3_current_consumption
            name: Dyson Heater
          - entity: sensor.tapo_p110m_4_basement_heater_current_consumption
            name: Basement Heater

      # ── 48h view for pattern detection ──
      - type: history-graph
        title: Power Draw by Device (48h)
        hours_to_show: 48
        entities:
          - entity: sensor.tapo_p110m_1_current_consumption
            name: Desktop
          - entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
            name: Nursery Heater
          - entity: sensor.tapo_p110m_3_current_consumption
            name: Dyson Heater
          - entity: sensor.tapo_p110m_4_basement_heater_current_consumption
            name: Basement Heater

      # ── 7-day view for weekly patterns ──
      - type: history-graph
        title: Power Draw by Device (7 Days)
        hours_to_show: 168
        entities:
          - entity: sensor.tapo_p110m_1_current_consumption
            name: Desktop
          - entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
            name: Nursery Heater
          - entity: sensor.tapo_p110m_3_current_consumption
            name: Dyson Heater
          - entity: sensor.tapo_p110m_4_basement_heater_current_consumption
            name: Basement Heater

  # ═══════════════════════════════════════════════════════════
  #  VIEW 3: COSTS — detailed cost breakdown
  # ═══════════════════════════════════════════════════════════
  - title: Costs
    path: costs
    icon: mdi:currency-usd
    cards:
      # ── Summary cards ──
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.total_energy_cost_today
            name: Today
            icon: mdi:cash
          - type: entity
            entity: sensor.total_energy_cost_monthly
            name: This Month
            icon: mdi:cash-multiple
          - type: entity
            entity: sensor.projected_monthly_energy_cost
            name: Projected Bill
            icon: mdi:chart-line-variant

      # ── Daily average + annual estimate ──
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.daily_average_energy_cost_this_month
            name: Daily Avg
            icon: mdi:chart-bar
          - type: entity
            entity: sensor.daily_average_energy_this_month
            name: Daily Avg kWh
            icon: mdi:lightning-bolt
          - type: entity
            entity: sensor.estimated_annual_energy_cost
            name: Est. Annual
            icon: mdi:calendar-clock

      # ── Today's costs per device ──
      - type: entities
        title: Today's Energy Costs
        show_header_toggle: false
        entities:
          - entity: sensor.desktop_desk_plug_energy_cost_today
            name: Desktop Desk
            icon: mdi:desktop-tower-monitor
          - entity: sensor.nursery_heater_plug_energy_cost_today
            name: Nursery Heater
            icon: mdi:radiator
          - entity: sensor.dyson_heater_plug_energy_cost_today
            name: Dyson Heater
            icon: mdi:fan
          - entity: sensor.basement_heater_plug_energy_cost_today
            name: Basement Heater
            icon: mdi:radiator
          - type: divider
          - entity: sensor.total_energy_cost_today
            name: Total Today
            icon: mdi:sigma

      # ── Monthly costs per device ──
      - type: entities
        title: This Month's Energy Costs
        show_header_toggle: false
        entities:
          - entity: sensor.desktop_desk_plug_energy_cost_monthly
            name: Desktop Desk
            icon: mdi:desktop-tower-monitor
          - entity: sensor.nursery_heater_plug_energy_cost_monthly
            name: Nursery Heater
            icon: mdi:radiator
          - entity: sensor.dyson_heater_plug_energy_cost_monthly
            name: Dyson Heater
            icon: mdi:fan
          - entity: sensor.basement_heater_plug_energy_cost_monthly
            name: Basement Heater
            icon: mdi:radiator
          - type: divider
          - entity: sensor.total_energy_cost_monthly
            name: Total This Month
            icon: mdi:sigma

  # ═══════════════════════════════════════════════════════════
  #  VIEW 4: USAGE — energy consumption (kWh)
  # ═══════════════════════════════════════════════════════════
  - title: Usage
    path: usage
    icon: mdi:chart-bar
    cards:
      # ── Today's totals ──
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.total_energy_today
            name: Total Today
            icon: mdi:lightning-bolt
          - type: entity
            entity: sensor.total_energy_this_month
            name: Total This Month
            icon: mdi:lightning-bolt-circle
          - type: entity
            entity: sensor.daily_average_energy_this_month
            name: Daily Avg
            icon: mdi:chart-line

      # ── Today's kWh per device ──
      - type: entities
        title: Today's Energy Usage (kWh)
        show_header_toggle: false
        entities:
          - entity: sensor.tapo_p110m_1_today_s_consumption
            name: Desktop Desk
            icon: mdi:desktop-tower-monitor
          - entity: sensor.tapo_p110m_2_nursery_heater_today_s_consumption
            name: Nursery Heater
            icon: mdi:radiator
          - entity: sensor.tapo_p110m_3_today_s_consumption
            name: Dyson Heater
            icon: mdi:fan
          - entity: sensor.tapo_p110m_4_basement_heater_today_s_consumption
            name: Basement Heater
            icon: mdi:radiator

      # ── Device share of total (this month) ──
      - type: entities
        title: Device Share of Monthly Usage
        show_header_toggle: false
        entities:
          - entity: sensor.desktop_desk_plug_share_of_total
            name: Desktop Desk
            icon: mdi:desktop-tower-monitor
          - entity: sensor.nursery_heater_plug_share_of_total
            name: Nursery Heater
            icon: mdi:radiator
          - entity: sensor.dyson_heater_plug_share_of_total
            name: Dyson Heater
            icon: mdi:fan
          - entity: sensor.basement_heater_plug_share_of_total
            name: Basement Heater
            icon: mdi:radiator

      # ── Daily energy bar chart (30 days) ──
      - type: statistics-graph
        title: Daily Energy Usage – Last 30 Days
        period: day
        days_to_show: 30
        stat_types:
          - sum
        chart_type: bar
        entities:
          - entity: sensor.tapo_p110m_1_today_s_consumption
            name: Desktop
          - entity: sensor.tapo_p110m_2_nursery_heater_today_s_consumption
            name: Nursery Heater
          - entity: sensor.tapo_p110m_3_today_s_consumption
            name: Dyson Heater
          - entity: sensor.tapo_p110m_4_basement_heater_today_s_consumption
            name: Basement Heater

      # ── Weekly energy (line) ──
      - type: statistics-graph
        title: Weekly Energy Usage
        period: week
        stat_types:
          - sum
        chart_type: line
        entities:
          - entity: sensor.tapo_p110m_1_today_s_consumption
            name: Desktop
          - entity: sensor.tapo_p110m_2_nursery_heater_today_s_consumption
            name: Nursery Heater
          - entity: sensor.tapo_p110m_3_today_s_consumption
            name: Dyson Heater
          - entity: sensor.tapo_p110m_4_basement_heater_today_s_consumption
            name: Basement Heater

      # ── Monthly energy bar chart ──
      - type: statistics-graph
        title: Monthly Energy Usage (kWh)
        period: month
        stat_types:
          - sum
        chart_type: bar
        entities:
          - entity: sensor.tapo_p110m_1_this_month_s_consumption
            name: Desktop
          - entity: sensor.tapo_p110m_2_nursery_heater_this_month_s_consumption
            name: Nursery Heater
          - entity: sensor.tapo_p110m_3_this_month_s_consumption
            name: Dyson Heater
          - entity: sensor.tapo_p110m_4_basement_heater_this_month_s_consumption
            name: Basement Heater

  # ═══════════════════════════════════════════════════════════
  #  VIEW 5: DEVICES — detailed per-device drill-down
  # ═══════════════════════════════════════════════════════════
  - title: Devices
    path: devices
    icon: mdi:power-plug
    cards:
      # ── Desktop Desk Plug ──
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Desktop Desk Plug"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.tapo_p110m_1_current_consumption
                name: Power Now
                icon: mdi:flash
              - type: entity
                entity: sensor.tapo_p110m_1_today_s_consumption
                name: Today (kWh)
                icon: mdi:lightning-bolt
              - type: entity
                entity: sensor.desktop_desk_plug_energy_cost_today
                name: Cost Today
                icon: mdi:cash
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.tapo_p110m_1_this_month_s_consumption
                name: Month (kWh)
                icon: mdi:calendar
              - type: entity
                entity: sensor.desktop_desk_plug_energy_cost_monthly
                name: Cost Month
                icon: mdi:cash-multiple
              - type: entity
                entity: sensor.desktop_desk_plug_share_of_total
                name: Share
                icon: mdi:percent
          - type: history-graph
            hours_to_show: 48
            entities:
              - entity: sensor.tapo_p110m_1_current_consumption
                name: Power (W)

      # ── Nursery Heater Plug ──
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Nursery Heater Plug"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
                name: Power Now
                icon: mdi:flash
              - type: entity
                entity: sensor.tapo_p110m_2_nursery_heater_today_s_consumption
                name: Today (kWh)
                icon: mdi:lightning-bolt
              - type: entity
                entity: sensor.nursery_heater_plug_energy_cost_today
                name: Cost Today
                icon: mdi:cash
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.tapo_p110m_2_nursery_heater_this_month_s_consumption
                name: Month (kWh)
                icon: mdi:calendar
              - type: entity
                entity: sensor.nursery_heater_plug_energy_cost_monthly
                name: Cost Month
                icon: mdi:cash-multiple
              - type: entity
                entity: sensor.nursery_heater_plug_share_of_total
                name: Share
                icon: mdi:percent
          - type: history-graph
            hours_to_show: 48
            entities:
              - entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
                name: Power (W)

      # ── Dyson Heater Plug ──
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Dyson Heater Plug"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.tapo_p110m_3_current_consumption
                name: Power Now
                icon: mdi:flash
              - type: entity
                entity: sensor.tapo_p110m_3_today_s_consumption
                name: Today (kWh)
                icon: mdi:lightning-bolt
              - type: entity
                entity: sensor.dyson_heater_plug_energy_cost_today
                name: Cost Today
                icon: mdi:cash
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.tapo_p110m_3_this_month_s_consumption
                name: Month (kWh)
                icon: mdi:calendar
              - type: entity
                entity: sensor.dyson_heater_plug_energy_cost_monthly
                name: Cost Month
                icon: mdi:cash-multiple
              - type: entity
                entity: sensor.dyson_heater_plug_share_of_total
                name: Share
                icon: mdi:percent
          - type: history-graph
            hours_to_show: 48
            entities:
              - entity: sensor.tapo_p110m_3_current_consumption
                name: Power (W)

      # ── Basement Heater Plug ──
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Basement Heater Plug"
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.tapo_p110m_4_basement_heater_current_consumption
                name: Power Now
                icon: mdi:flash
              - type: entity
                entity: sensor.tapo_p110m_4_basement_heater_today_s_consumption
                name: Today (kWh)
                icon: mdi:lightning-bolt
              - type: entity
                entity: sensor.basement_heater_plug_energy_cost_today
                name: Cost Today
                icon: mdi:cash
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.tapo_p110m_4_basement_heater_this_month_s_consumption
                name: Month (kWh)
                icon: mdi:calendar
              - type: entity
                entity: sensor.basement_heater_plug_energy_cost_monthly
                name: Cost Month
                icon: mdi:cash-multiple
              - type: entity
                entity: sensor.basement_heater_plug_share_of_total
                name: Share
                icon: mdi:percent
          - type: history-graph
            hours_to_show: 48
            entities:
              - entity: sensor.tapo_p110m_4_basement_heater_current_consumption
                name: Power (W)

  # ═══════════════════════════════════════════════════════════
  #  VIEW 6: SETTINGS — update PECO bill rates
  # ═══════════════════════════════════════════════════════════
  - title: Settings
    path: settings
    icon: mdi:cog
    cards:
      - type: entities
        title: PECO Rate Components
        show_header_toggle: false
        entities:
          - entity: input_number.peco_delivery_rate
            name: Delivery Rate ($/kWh)
          - entity: input_number.peco_supply_rate
            name: Supply Rate ($/kWh)
          - entity: input_number.peco_transmission_rate
            name: Transmission Rate ($/kWh)
          - type: divider
          - entity: input_number.peco_customer_charge
            name: Customer Charge ($/mo)
          - type: divider
          - entity: sensor.peco_variable_rate
            name: Combined Variable Rate

      - type: entities
        title: Last Bill Info
        show_header_toggle: false
        entities:
          - entity: input_number.peco_last_bill_amount
            name: Bill Amount ($)
          - entity: input_number.peco_last_bill_kwh
            name: Bill Usage (kWh)
          - entity: input_number.peco_last_bill_days
            name: Billing Period (days)

      - type: markdown
        content: >
          ### How to Update Rates

          When you receive a new PECO bill, update the rates above:

          1. **Delivery Rate** — from "Distribution Charges" line (per kWh rate)

          2. **Supply Rate** — from "Generation Charges" line (per kWh rate)

          3. **Transmission Rate** — from "Transmission Charges" line (per kWh rate)

          4. **Customer Charge** — fixed monthly charge from bill

          5. **Bill Amount/kWh/Days** — totals from your bill for reference

          All energy cost sensors will update automatically.
