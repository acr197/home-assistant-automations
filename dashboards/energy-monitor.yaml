  # ═══════════════════════════════════════════════════════════
  #  VIEW 3: SETTINGS — device toggles, billing, PECO rates
  # ═══════════════════════════════════════════════════════════
  - title: Settings
    path: settings
    icon: mdi:cog
    cards:

      # ══════════════════════════════════════════════════════
      #  DEVICE REGISTRY — toggle show/hide in Overview
      # ══════════════════════════════════════════════════════
      - type: markdown
        content: |
          <small style="color: var(--secondary-text-color);">
          The <strong>Individual Devices Total Usage</strong> chart on the Overview tab auto-syncs with HA Energy settings.
          To add or remove devices from that chart, go to
          <a href="/config/energy" style="color:var(--primary-color);">Settings → Energy → Individual <strong>Devices</strong></a>.
          Gauge cards and cost tables below require a separate YAML update — just tell Claude Code "Add [device name]."
          </small>

      # AUTO-SYNC NOTE:
      #   • The "Individual Devices Total Usage" bar chart (Overview → power
      #     section, right column) ALREADY auto-syncs with HA Energy settings.
      #     Add a device there → it appears in that chart automatically.
      #   • The gauge cards, cost table, and statistics graphs need manual
      #     YAML updates because they use different sensor types (live watts
      #     vs. monthly kWh). Just tell Claude "Add [device name]" and it
      #     wires everything in one commit.
      # TO HIDE a device gauge from Overview: flip its toggle to off.
      # TO ADD a new device: tell Claude Code "Add [device name] with
      #   entity prefix sensor.tapo_p110mX_* to the dashboard."
      - type: entities
        title: Device Registry — Active Smart Plugs
        show_header_toggle: false
        entities:
          - entity: sensor.tapo_p110m_1_current_consumption
            name: "1 · Desktop Desk Plug"
            icon: mdi:desktop-tower-monitor
            secondary_info: last-changed
          - entity: input_boolean.show_device_desktop
            name: "  Show in Overview"
          - type: divider
          - entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
            name: "2 · Nursery Heater Plug"
            icon: mdi:radiator
            secondary_info: last-changed
          - entity: input_boolean.show_device_nursery
            name: "  Show in Overview"
          - type: divider
          - entity: sensor.tapo_p110m_3_current_consumption
            name: "3 · Dyson Heater Plug"
            icon: mdi:fan
            secondary_info: last-changed
          - entity: input_boolean.show_device_dyson
            name: "  Show in Overview"
          - type: divider
          - entity: sensor.tapo_p110m_4_basement_heater_current_consumption
            name: "4 · Basement Heater Plug"
            icon: mdi:radiator
            secondary_info: last-changed
          - entity: input_boolean.show_device_basement
            name: "  Show in Overview"
          - type: divider
          - entity: sensor.tumble_dryer_energy_consumption
            name: "5 · Miele Tumble Dryer"
            icon: mdi:tumble-dryer
            secondary_info: last-changed
          - type: divider
          - entity: sensor.guest_bedroom_desk_plug_current_consumption
            name: "6 · Guest Bedroom Desk Plug"
            icon: mdi:desk
            secondary_info: last-changed
          - entity: input_boolean.show_device_guest_bedroom
            name: "  Show in Overview"

      # ══════════════════════════════════════════════════════
      #  PECO BILL — manual entry + future AI upload
      # ══════════════════════════════════════════════════════
      - type: entities
        title: Last Bill Info
        show_header_toggle: false
        entities:
          - entity: input_number.peco_last_bill_amount
            name: Bill Amount ($)
            icon: mdi:receipt-text
