title: Energy Monitor
views:
  # ═══════════════════════════════════════════════════════════
  #  VIEW 1: OVERVIEW — at-a-glance energy summary
  # ═══════════════════════════════════════════════════════════
  - title: Overview
    path: overview
    icon: mdi:lightning-bolt
    type: panel
    # Background: the teal gradient is the fallback — it shows immediately.
    # Once you upload the power-towers photo to /config/www/energy-bg.jpg
    # the image overlays the gradient. Hard-refresh (Ctrl+Shift+R) after upload.
    background: "url('/local/energy-bg.jpg') center/cover no-repeat, linear-gradient(160deg, #071a28 0%, #030d10 60%, #0a1a10 100%)"
    cards:
      # Panel view: one top-level vertical-stack, full width.
      # horizontal-stacks inside become proper 3-column rows.
      - type: vertical-stack
        cards:

          # ══════════════════════════════════════════════════════
          #  SECTION HEADER — energy monitor
          # ══════════════════════════════════════════════════════
          - type: custom:button-card
            show_name: true
            show_state: false
            show_icon: true
            icon: mdi:lightning-bolt-circle
            name: energy monitor
            tap_action:
              action: none
            hold_action:
              action: none
            styles:
              card:
                - background: transparent
                - box-shadow: none
                - border-radius: "0"
                - padding: "6px 8px 4px"
                - border-bottom: "1px solid #00b4ab"
                - margin-bottom: "4px"
              grid:
                - grid-template-areas: '"i n"'
                - grid-template-columns: "min-content 1fr"
                - grid-template-rows: min-content
              icon:
                - color: "#00b4ab"
                - width: "15px"
                - margin-right: "6px"
              name:
                - text-transform: lowercase
                - letter-spacing: "3px"
                - font-size: "11px"
                - color: "var(--secondary-text-color)"
                - text-align: left
                - justify-self: start

          # ══════════════════════════════════════════════════════
          #  TOP ROW: PECO Rate | Energy Distribution | Costs
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Top Left: PECO Rate — editable inputs with gradient header ──
              - type: entities
                title: peco
                show_header_toggle: false
                card_mod:
                  style: |
                    ha-card {
                      background: var(--ha-card-background, var(--card-background-color));
                      border-radius: 16px;
                      box-shadow: none;
                      height: 100%;
                    }

                    .card-header {
                      background: linear-gradient(135deg, #00b4ab, #6b2fa0) !important;
                      border-radius: 16px 16px 0 0 !important;
                      color: white !important;
                      font-size: 20px !important;
                      font-weight: 700 !important;
                      letter-spacing: 5px !important;
                      text-transform: lowercase !important;
                      padding: 10px 16px !important;
                    }
                    .card-content {
                      padding-top: 16px !important;
                    }
                entities:
                  - entity: sensor.peco_variable_rate
                    name: Combined Rate ($/kWh)
                    icon: mdi:lightning-bolt
                  - type: divider
                  - entity: input_number.peco_delivery_rate
                    name: Delivery ($/kWh)
                  - entity: input_number.peco_supply_rate
                    name: Supply ($/kWh)
                  - entity: input_number.peco_transmission_rate
                    name: Transmission ($/kWh)
                  - entity: input_number.peco_customer_charge
                    name: Customer Charge ($/mo)
                  - type: divider
                  - entity: input_number.billing_cycle_start_day
                    name: Billing Cycle Start Day

                content: |

                  **PECO Rate: ${{ states('sensor.peco_variable_rate') }}/kWh**

                  Last bill: **${{ states('input_number.peco_last_bill_amount') }}** for **{{ states('input_number.peco_last_bill_kwh') | int }} kWh** ({{ states('input_number.peco_last_bill_days') | int }} days)

                  <table style="width:100%;border-collapse:collapse;margin-top:8px;font-size:0.88em;">
                    <thead>
                      <tr style="background:linear-gradient(90deg,#00b4ab,#6b2fa0);">
                        <th style="color:white;padding:6px 8px;text-align:left;font-weight:600;">Component</th>
                        <th style="color:white;padding:6px 8px;text-align:right;font-weight:600;">Rate</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);">Delivery</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:var(--primary-color);">${{ states('input_number.peco_delivery_rate') }}/kWh</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);">Supply</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:var(--primary-color);">${{ states('input_number.peco_supply_rate') }}/kWh</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);">Transmission</td>
                        <td style="padding:5px 8px;border-bottom:1px solid var(--divider-color);text-align:right;color:var(--primary-color);">${{ states('input_number.peco_transmission_rate') }}/kWh</td>
                      </tr>
                      <tr>
                        <td style="padding:5px 8px;">Customer charge</td>
                        <td style="padding:5px 8px;text-align:right;color:var(--primary-color);">${{ states('input_number.peco_customer_charge') }}/mo fixed</td>
                      </tr>
                    </tbody>
                  </table>

              # ── Top Middle: Energy Distribution + usage totals ──
              - type: vertical-stack
                cards:
                  - type: entity
                    entity: sensor.total_energy_today
                    name: Total Usage Today
                    icon: mdi:lightning-bolt
                    card_mod:
                      style: |
                        ha-card {
                          background: var(--ha-card-background, var(--card-background-color));
                          border-radius: 16px;
                          box-shadow: none;
                        }
                  - type: entity
                    entity: sensor.total_energy_this_month
                    name: Total This Month
                    icon: mdi:lightning-bolt-circle
                    card_mod:
                      style: |
                        ha-card {
                          background: var(--ha-card-background, var(--card-background-color));
                          border-radius: 16px;
                          box-shadow: none;
                        }

              # ── Top Right: 6-block cost summary ──
              - type: vertical-stack
                cards:
                  - type: horizontal-stack
                    cards:
                      - type: entity
                        entity: sensor.total_power_draw_now
                        name: Live Power
                        icon: mdi:flash
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 120px;
                            }
                      - type: entity
                        entity: sensor.total_energy_cost_today
                        name: Cost Today
                        icon: mdi:currency-usd
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 120px;
                            }
                      - type: entity
                        entity: sensor.total_energy_cost_monthly
                        name: Cost This Month
                        icon: mdi:calendar-month
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 120px;
                            }
                  - type: horizontal-stack
                    cards:
                      - type: entity
                        entity: sensor.projected_monthly_energy_cost
                        name: Projected Bill
                        icon: mdi:chart-line-variant
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 120px;
                            }
                      - type: entity
                        entity: sensor.daily_average_energy_cost_this_month
                        name: Daily Avg Cost
                        icon: mdi:chart-bar
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 120px;
                            }
                      - type: entity
                        entity: sensor.estimated_annual_energy_cost
                        name: Est. Annual
                        icon: mdi:calendar-clock
                        card_mod:
                          style: |
                            ha-card {
                              background: var(--ha-card-background, var(--card-background-color));
                              border-radius: 16px;
                              box-shadow: none;
                              min-height: 120px;
                            }
                  - type: entity
                    entity: sensor.daily_average_energy_this_month
                    name: Daily Avg kWh
                    icon: mdi:chart-line
                    card_mod:
                      style: |
                        ha-card {
                          background: var(--ha-card-background, var(--card-background-color));
                          border-radius: 16px;
                          box-shadow: none;
                        }

          # ══════════════════════════════════════════════════════
          #  SECTION HEADER — power (live wattage)
          # ══════════════════════════════════════════════════════
          - type: custom:button-card
            entity: sensor.total_power_draw_now
            show_name: true
            show_state: true
            show_icon: true
            icon: mdi:flash
            name: power
            tap_action:
              action: none
            hold_action:
              action: none
            styles:
              card:
                - background: transparent
                - box-shadow: none
                - border-radius: "0"
                - padding: "10px 8px 4px"
                - border-bottom: "1px solid #e74c3c"
                - margin-bottom: "4px"
              grid:
                - grid-template-areas: '"i n s"'
                - grid-template-columns: "min-content 1fr min-content"
                - grid-template-rows: min-content
              icon:
                - color: "#e74c3c"
                - width: "15px"
                - margin-right: "6px"
              name:
                - text-transform: lowercase
                - letter-spacing: "3px"
                - font-size: "11px"
                - color: "var(--secondary-text-color)"
                - text-align: left
                - justify-self: start
              state:
                - font-size: "13px"
                - font-weight: "600"
                - color: "var(--primary-text-color)"
                - justify-self: end

          # ══════════════════════════════════════════════════════
          #  BOTTOM ROW: Gauges | Power Graph | Device Charts
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:

              # ── Bottom Left: "Current Usage" title + 6 real-time gauges ──
              - type: vertical-stack
                cards:
                  - type: markdown
                    content: "## Current Usage"
                    card_mod:
                      style: |
                        ha-card {
                          background: var(--ha-card-background, var(--card-background-color));
                          border-radius: 16px;
                          box-shadow: none;
                        }
                        ha-markdown {
                          padding: 12px 16px 16px !important;
                        }
                        ha-markdown h2 {
                          font-size: 24px !important;
                          font-weight: 400 !important;
                          margin: 0 !important;
                          color: var(--primary-text-color);
                        }
                  - type: horizontal-stack
                    cards:
                      - type: conditional
                        conditions:
                          - condition: state
                            entity: input_boolean.show_device_desktop
                            state: "on"
                        card:
                          type: vertical-stack
                          cards:
                            - type: gauge
                              entity: sensor.tapo_p110m_1_current_consumption
                              name: Desktop
                              unit: W
                              min: 0
                              max: 500
                              needle: true
                              severity:
                                green: 0
                                yellow: 150
                                red: 350
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 16px 16px 0 0;
                                    box-shadow: none;
                                    min-height: 140px;
                                  }
                            - type: markdown
                              content: >
                                {%- set w = states('sensor.tapo_p110m_1_current_consumption')|float(0) -%}
                                {%- set r = states('sensor.peco_variable_rate')|float(0) -%}
                                ~${{ "%.2f" % (w * 24 / 1000 * r) }}/day
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 0 0 16px 16px;
                                    box-shadow: none;
                                    margin-top: -1px;
                                    overflow: hidden;
                                  }
                                  ha-markdown { padding: 2px 8px 10px !important; overflow: hidden !important; }
                                  ha-markdown p { text-align: center; font-size: 0.74em; color: var(--secondary-text-color); margin: 0 !important; }
                      - type: conditional
                        conditions:
                          - condition: state
                            entity: input_boolean.show_device_nursery
                            state: "on"
                        card:
                          type: vertical-stack
                          cards:
                            - type: gauge
                              entity: sensor.tapo_p110m_2_nursery_heater_current_consumption
                              name: Nursery Heater
                              unit: W
                              min: 0
                              max: 1500
                              needle: true
                              severity:
                                green: 0
                                yellow: 500
                                red: 1000
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 16px 16px 0 0;
                                    box-shadow: none;
                                    min-height: 140px;
                                  }
                            - type: markdown
                              content: >
                                {%- set w = states('sensor.tapo_p110m_2_nursery_heater_current_consumption')|float(0) -%}
                                {%- set r = states('sensor.peco_variable_rate')|float(0) -%}
                                ~${{ "%.2f" % (w * 24 / 1000 * r) }}/day
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 0 0 16px 16px;
                                    box-shadow: none;
                                    margin-top: -1px;
                                    overflow: hidden;
                                  }
                                  ha-markdown { padding: 2px 8px 10px !important; overflow: hidden !important; }
                                  ha-markdown p { text-align: center; font-size: 0.74em; color: var(--secondary-text-color); margin: 0 !important; }
                  - type: horizontal-stack
                    cards:
                      - type: conditional
                        conditions:
                          - condition: state
                            entity: input_boolean.show_device_dyson
                            state: "on"
                        card:
                          type: vertical-stack
                          cards:
                            - type: gauge
                              entity: sensor.tapo_p110m_3_current_consumption
                              name: Dyson Heater
                              unit: W
                              min: 0
                              max: 2000
                              needle: true
                              severity:
                                green: 0
                                yellow: 500
                                red: 1200
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 16px 16px 0 0;
                                    box-shadow: none;
                                    min-height: 140px;
                                  }
                            - type: markdown
                              content: >
                                {%- set w = states('sensor.tapo_p110m_3_current_consumption')|float(0) -%}
                                {%- set r = states('sensor.peco_variable_rate')|float(0) -%}
                                ~${{ "%.2f" % (w * 24 / 1000 * r) }}/day
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 0 0 16px 16px;
                                    box-shadow: none;
                                    margin-top: -1px;
                                    overflow: hidden;
                                  }
                                  ha-markdown { padding: 2px 8px 10px !important; overflow: hidden !important; }
                                  ha-markdown p { text-align: center; font-size: 0.74em; color: var(--secondary-text-color); margin: 0 !important; }
                      - type: conditional
                        conditions:
                          - condition: state
                            entity: input_boolean.show_device_basement
                            state: "on"
                        card:
                          type: vertical-stack
                          cards:
                            - type: gauge
                              entity: sensor.tapo_p110m_4_basement_heater_current_consumption
                              name: Basement Heater
                              unit: W
                              min: 0
                              max: 1500
                              needle: true
                              severity:
                                green: 0
                                yellow: 500
                                red: 1000
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 16px 16px 0 0;
                                    box-shadow: none;
                                    min-height: 140px;
                                  }
                            - type: markdown
                              content: >
                                {%- set w = states('sensor.tapo_p110m_4_basement_heater_current_consumption')|float(0) -%}
                                {%- set r = states('sensor.peco_variable_rate')|float(0) -%}
                                ~${{ "%.2f" % (w * 24 / 1000 * r) }}/day
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 0 0 16px 16px;
                                    box-shadow: none;
                                    margin-top: -1px;
                                    overflow: hidden;
                                  }
                                  ha-markdown { padding: 2px 8px 10px !important; overflow: hidden !important; }
                                  ha-markdown p { text-align: center; font-size: 0.74em; color: var(--secondary-text-color); margin: 0 !important; }
                  - type: horizontal-stack
                    cards:
                      - type: conditional
                        conditions:
                          - condition: state
                            entity: input_boolean.show_device_guest_bedroom
                            state: "on"
                        card:
                          type: vertical-stack
                          cards:
                            - type: gauge
                              entity: sensor.guest_bedroom_desk_plug_current_consumption
                              name: Guest Bedroom
                              unit: W
                              min: 0
                              max: 1500
                              needle: true
                              severity:
                                green: 0
                                yellow: 200
                                red: 800
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 16px 16px 0 0;
                                    box-shadow: none;
                                    min-height: 140px;
                                  }
                            - type: markdown
                              content: >
                                {%- set w = states('sensor.guest_bedroom_desk_plug_current_consumption')|float(0) -%}
                                {%- set r = states('sensor.peco_variable_rate')|float(0) -%}
                                ~${{ "%.2f" % (w * 24 / 1000 * r) }}/day
                              card_mod:
                                style: |
                                  ha-card {
                                    background: var(--ha-card-background, var(--card-background-color));
                                    border-radius: 0 0 16px 16px;
                                    box-shadow: none;
                                    margin-top: -1px;
                                    overflow: hidden;
                                  }
                                  ha-markdown { padding: 2px 8px 10px !important; overflow: hidden !important; }
                                  ha-markdown p { text-align: center; font-size: 0.74em; color: var(--secondary-text-color); margin: 0 !important; }

              # ── Bottom Right: Daily energy by device with 7d / 14d / 30d toggle ──
              # Tabs set input_select.energy_chart_period; the apexcharts-card
              # below reads that helper to set its graph_span dynamically.
              - type: vertical-stack
                cards:
                  # Tab bar: 7d / 14d / 30d
                  - type: horizontal-stack
                    cards:
                      - type: custom:button-card
                        entity: input_select.energy_chart_period
                        name: "7d"
                        show_name: true
                        show_icon: false
                        show_state: false
                        tap_action:
                          action: call-service
                          service: input_select.select_option
                          service_data:
                            entity_id: input_select.energy_chart_period
                            option: "7d"
                        state:
                          - value: "7d"
                            styles:
                              card:
                                - background: "linear-gradient(135deg, #00b4ab, #6b2fa0)"
                              name:
                                - color: "white"
                        styles:
                          card:
                            - background: "var(--ha-card-background, var(--card-background-color))"
                            - border-radius: "16px 0 0 0"
                            - box-shadow: none
                            - padding: "8px 0"
                            - border-bottom: "1px solid var(--divider-color)"
                          name:
                            - font-size: "12px"
                            - font-weight: "600"
                            - letter-spacing: "2px"
                            - color: "var(--secondary-text-color)"
                            - text-transform: uppercase
                      - type: custom:button-card
                        entity: input_select.energy_chart_period
                        name: "14d"
                        show_name: true
                        show_icon: false
                        show_state: false
                        tap_action:
                          action: call-service
                          service: input_select.select_option
                          service_data:
                            entity_id: input_select.energy_chart_period
                            option: "14d"
                        state:
                          - value: "14d"
                            styles:
                              card:
                                - background: "linear-gradient(135deg, #00b4ab, #6b2fa0)"
                              name:
                                - color: "white"
                        styles:
                          card:
                            - background: "var(--ha-card-background, var(--card-background-color))"
                            - border-radius: "0"
                            - box-shadow: none
                            - padding: "8px 0"
                            - border-bottom: "1px solid var(--divider-color)"
                          name:
                            - font-size: "12px"
                            - font-weight: "600"
                            - letter-spacing: "2px"
                            - color: "var(--secondary-text-color)"
                            - text-transform: uppercase
                      - type: custom:button-card
                        entity: input_select.energy_chart_period
                        name: "30d"
                        show_name: true
                        show_icon: false
                        show_state: false
                        tap_action:
                          action: call-service
                          service: input_select.select_option
                          service_data:
                            entity_id: input_select.energy_chart_period
                            option: "30d"
                        state:
                          - value: "30d"
                            styles:
                              card:
                                - background: "linear-gradient(135deg, #00b4ab, #6b2fa0)"
                              name:
                                - color: "white"
                        styles:
                          card:
                            - background: "var(--ha-card-background, var(--card-background-color))"
                            - border-radius: "0 16px 0 0"
                            - box-shadow: none
                            - padding: "8px 0"
                            - border-bottom: "1px solid var(--divider-color)"
                          name:
                            - font-size: "12px"
                            - font-weight: "600"
                            - letter-spacing: "2px"
                            - color: "var(--secondary-text-color)"
                            - text-transform: uppercase
                  # Stacked daily-energy bar chart (graph_span follows the tab)
                  - type: custom:apexcharts-card
                    graph_span: "{{ states('input_select.energy_chart_period') }}"
                    span:
                      end: day
                    update_interval: 30s
                    header:
                      title: "Daily Energy by Device (kWh)"
                      show: true
                      show_states: false
                    card_mod:
                      style: |
                        ha-card {
                          background: var(--ha-card-background, var(--card-background-color));
                          border-radius: 0 0 16px 16px;
                          box-shadow: none;
                          margin-top: -1px;
                          min-height: 290px;
                        }
                    apex_config:
                      chart:
                        type: bar
                        stacked: true
                      plotOptions:
                        bar:
                          columnWidth: "70%"
                      legend:
                        show: true
                        position: bottom
                        horizontalAlign: center
                        fontSize: "11px"
                        itemMargin:
                          horizontal: 8
                          vertical: 3
                        markers:
                          width: 8
                          height: 8
                    series:
                      - entity: sensor.tapo_p110m_1_today_s_consumption
                        name: Desktop
                        type: column
                        color: "#f39c12"
                        statistics:
                          type: change
                          period: day
                        group_by:
                          func: max
                          duration: 1d
                      - entity: sensor.tapo_p110m_2_nursery_heater_today_s_consumption
                        name: Nursery Heater
                        type: column
                        color: "#3498db"
                        statistics:
                          type: change
                          period: day
                        group_by:
                          func: max
                          duration: 1d
