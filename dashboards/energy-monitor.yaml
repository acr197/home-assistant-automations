          Tap any row to toggle visibility on the Overview dashboard.
          Hidden devices still record data — they're just suppressed from charts and totals.

      - type: entities
        title: Hidden Devices Storage
        show_header_toggle: false
        entities:
          - entity: input_text.energy_hidden_devices
            name: Hidden slug list
            icon: mdi:eye-off
          - type: call-service
            name: Reset — show all devices
            icon: mdi:eye
            service: input_text.set_value
            service_data:
              entity_id: input_text.energy_hidden_devices
              value: ""

      - type: custom:auto-entities
        card:
          type: entities
          title: All Discovered Energy Devices
          show_header_toggle: false
        card_param: entities
        sort:
          method: friendly_name
        filter:
          include:
            - entity_id: "sensor.*_today_s_consumption"
              attributes:
                device_class: energy
              options:
                type: custom:button-card
                entity: this.entity_id
                show_state: true
                show_name: true
                show_icon: true
                name: |
                  [[[
                    return (entity.attributes.friendly_name || '')
                      .replace("Today's Consumption","")
                      .replace("Today's consumption","")
                      .replace("Plug","")
                      .replace(/\s+/g," ")
                      .trim();
                  ]]]
                tap_action:
                  action: call-service
                  service: input_text.set_value
                  service_data:
                    entity_id: input_text.energy_hidden_devices
                    value: |
                      [[[
                        const slug = entity.entity_id.replace('sensor.','').replace('_today_s_consumption','');
                        const obj = states['input_text.energy_hidden_devices'];
                        const cur = (obj && obj.state) ? obj.state : '';
                        const list = cur.split(',').filter(x => x.length > 0);
                        const idx = list.indexOf(slug);
                        if (idx >= 0) list.splice(idx, 1);
                        else list.push(slug);
                        return list.join(',');
                      ]]]
                state:
                  - operator: template
                    value: |
                      [[[
                        const slug = entity.entity_id.replace('sensor.','').replace('_today_s_consumption','');
                        const obj = states['input_text.energy_hidden_devices'];
                        const cur = (obj && obj.state) ? obj.state : '';
                        return cur.split(',').filter(x => x.length > 0).includes(slug);
                      ]]]
                    styles:
                      card:
                        - opacity: "0.5"
                      name:
                        - color: "var(--secondary-text-color)"
                      state:
                        - color: "var(--secondary-text-color)"
                styles:
                  card:
                    - background: "transparent"
                    - box-shadow: "none"
                    - padding: "10px 0"
                    - border-bottom: "1px solid var(--divider-color)"
                  grid:
                    - grid-template-areas: '"i n s"'
                    - grid-template-columns: "min-content 1fr min-content"
                  icon:
                    - color: "var(--primary-color)"
                    - width: "20px"
                    - margin-right: "10px"
                  name:
                    - text-align: "left"
                    - justify-self: "start"
                    - font-weight: "500"
                  state:
                    - font-size: "0.85em"
                    - color: "var(--secondary-text-color)"
                    - justify-self: "end"
          exclude:
            - entity_id: "sensor.total_*"

      - type: custom:energy-bill-drop-card
        title: Upload Energy Bill

  # ═══════════════════════════════════════════════════════════
  #  VIEW 3: SETTINGS
  # ═══════════════════════════════════════════════════════════
  - title: Settings
    path: settings
    icon: mdi:cog
    cards:
      - type: markdown
        content: |
          ### How it works

          The dashboard is fully dynamic. Every chart and total filters live from `states.sensor` and respects `input_text.energy_hidden_devices`.

          **Add a device:** plug it in. HA discovers its sensors. Charts include it automatically.
          **Hide/show:** tap chip on Overview, or use the Devices tab.
          **Non-conforming brands:** add a `utility_meter` block to `configuration.yaml` (see existing Tumble Dryer).

      - type: entities
        title: Last Bill Info
        show_header_toggle: false
        entities:
          - entity: input_number.peco_last_bill_amount
            name: Bill Amount ($)
            icon: mdi:receipt-text
          - entity: input_number.peco_last_bill_kwh
            name: Bill Usage (kWh)
            icon: mdi:counter
          - entity: input_number.peco_last_bill_days
            name: Billing Period (days)
            icon: mdi:calendar-range