esphome:
  name: esp-guestbr
  friendly_name: ESP-GuestBR

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret esp_guestbr_api_key

ota:
  platform: esphome
  password: !secret esp_guestbr_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp-Guestbr Fallback Hotspot"
    password: !secret esp_guestbr_ap_password

bluetooth_proxy:
  active: true

captive_portal:
