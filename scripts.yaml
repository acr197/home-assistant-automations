toggle_thermostat_automations:
  alias: 'Guest Mode: Toggle Thermostat Automations On/Off'
  mode: single
  variables:
    thermo_automations: "{% set a = states.automation\n   | selectattr('attributes.friendly_name','search','^(Thermostat:|Geolocation:)')\n
      \  | map(attribute='entity_id') | list %}\n{{ a }}\n"
    any_on: '{{ expand(thermo_automations) | selectattr(''state'',''eq'',''on'') |
      list | count > 0 }}'
  sequence:
  - service: climate.set_preset_mode
    target:
      device_id: f3c1f908ad1c39e5ed8dfa9044b5928b
    data:
      preset_mode: none
  - choose:
    - conditions: '{{ any_on }}'
      sequence:
      - service: automation.turn_off
        target:
          entity_id: '{{ thermo_automations }}'
    - conditions: '{{ not any_on }}'
      sequence:
      - service: automation.turn_on
        target:
          entity_id: '{{ thermo_automations }}'
  - service: homeassistant.update_entity
    target:
      entity_id: sensor.guest_mode_status
wake_andrews_desktop:
  alias: Wake Andrews Desktop
  sequence:
  - data:
      mac: 04-7C-16-C1-3C-72
    action: wake_on_lan.send_magic_packet
  description: ''
