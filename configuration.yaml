cloud:
default_config:

homeassistant:
  external_url: "https://virusdistributioncenter.duckdns.org"
  internal_url: "http://192.168.0.100:8123"
  country: "US"

http:
  ssl_certificate: /ssl/fullchain.pem
  ssl_key: /ssl/privkey.pem

tts:
  - platform: google_translate

group:
  household_anyone_home:
    name: Anyone Home
    entities:
      - person.andrew
      - person.amy
  household_everyone_home:
    name: Everyone Home
    all: true
    entities:
      - person.andrew
      - person.amy
  guest_mode_thermostat_automations:
    name: Guest Mode Thermostat Automations
    entities:
      - automation.thermostat_change_eco_off_when_home
      - automation.thermostat_change_to_eco_when_away
      - automation.thermostat_when_thermostat_is_over_76_and_andrew_and_amy_are_at_work_turn_thermostat_eco_off_at_1_30pm
      - automation.thermostat_when_thermostat_is_under_63_and_andrew_and_amy_are_at_work_at_1_30pm_turn_thermostat_eco_off

input_boolean:
  guest_mode:

input_button:
  sync_github:
    name: Sync GitHub
    icon: mdi:github

template:
  - sensor:
      - name: Guest Mode Status
        unique_id: guest_mode_status
        state: "{{ 'Active' if is_state('input_boolean.guest_mode','on') else 'Inactive' }}"
      - name: "Thermostat Heating State"
        unique_id: thermostat_heating_state
        state: "{{ is_state_attr('climate.hallway', 'hvac_action', 'heating') }}"
      - name: "Thermostat Cooling State"
        unique_id: thermostat_cooling_state
        state: "{{ is_state_attr('climate.hallway', 'hvac_action', 'cooling') }}"
      - name: "Andrew Distance To Home (mi)"
        unique_id: andrew_distance_home_mi
        unit_of_measurement: "mi"
        availability: >
          {{ states('person.andrew') not in ['unknown', 'unavailable']
             and state_attr('zone.home', 'latitude') is not none }}
        state: >
          {% set d = distance('person.andrew', state_attr('zone.home','latitude'), state_attr('zone.home','longitude')) %}
          {{ (d | float(0) * 0.621371) | round(2) }}
      - name: "Amy Distance To Home (mi)"
        unique_id: amy_distance_home_mi
        unit_of_measurement: "mi"
        availability: >
          {{ states('person.amy') not in ['unknown', 'unavailable']
             and state_attr('zone.home', 'latitude') is not none }}
        state: >
          {% set d = distance('person.amy', state_attr('zone.home','latitude'), state_attr('zone.home','longitude')) %}
          {{ (d | float(0) * 0.621371) | round(2) }}
      - name: "Outdoor Temperature"
        unique_id: outdoor_temperature_openmeteo
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ state_attr('sensor.openmeteo_raw','current') not in [None, 'unknown', 'unavailable'] }}
        state: >
          {% set cw = state_attr('sensor.openmeteo_raw','current') %}
          {{ cw['temperature_2m'] if cw else None }}
      - name: "Outdoor Feels Like"
        unique_id: outdoor_feels_like_openmeteo
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ state_attr('sensor.openmeteo_raw','current') not in [None, 'unknown', 'unavailable'] }}
        state: >
          {% set cw = state_attr('sensor.openmeteo_raw','current') %}
          {{ cw['apparent_temperature'] if cw else None }}
      - name: "Outdoor Humidity"
        unique_id: outdoor_humidity_openmeteo
        unit_of_measurement: "%"
        device_class: humidity
        state_class: measurement
        availability: >
          {{ state_attr('sensor.openmeteo_raw','current') not in [None, 'unknown', 'unavailable'] }}
        state: >
          {% set cw = state_attr('sensor.openmeteo_raw','current') %}
          {{ cw['relative_humidity_2m'] if cw else None }}
      # ── Energy cost sensors ──
      # PECO all-in rate: $144.18 / 624 kWh = $0.2311/kWh
      # Breakdown: Delivery $0.10276 + Generation $0.10237 + Transmission $0.00787 = $0.21300 variable
      #            + $11.30 customer charge / ~624 kWh ≈ $0.0181 fixed = ~$0.2311 total
      - name: "Desktop Desk Plug Energy Cost Today"
        unique_id: desktop_desk_plug_energy_cost_today
        unit_of_measurement: "$"
        state: >
          {{ (states('sensor.desktop_desk_plug_today_s_energy') | float(0) * 0.2311) | round(2) }}
      - name: "Nursery Heater Plug Energy Cost Today"
        unique_id: nursery_heater_plug_energy_cost_today
        unit_of_measurement: "$"
        state: >
          {{ (states('sensor.nursery_heater_plug_today_s_energy') | float(0) * 0.2311) | round(2) }}
      - name: "Dyson Heater Plug Energy Cost Today"
        unique_id: dyson_heater_plug_energy_cost_today
        unit_of_measurement: "$"
        state: >
          {{ (states('sensor.dyson_heater_plug_today_s_energy') | float(0) * 0.2311) | round(2) }}
      - name: "Basement Heater Plug Energy Cost Today"
        unique_id: basement_heater_plug_energy_cost_today
        unit_of_measurement: "$"
        state: >
          {{ (states('sensor.basement_heater_plug_today_s_energy') | float(0) * 0.2311) | round(2) }}
      - name: "Desktop Desk Plug Energy Cost Monthly"
        unique_id: desktop_desk_plug_energy_cost_monthly
        unit_of_measurement: "$"
        state: >
          {{ (states('sensor.desktop_desk_plug_this_month_s_energy') | float(0) * 0.2311) | round(2) }}
      - name: "Nursery Heater Plug Energy Cost Monthly"
        unique_id: nursery_heater_plug_energy_cost_monthly
        unit_of_measurement: "$"
        state: >
          {{ (states('sensor.nursery_heater_plug_this_month_s_energy') | float(0) * 0.2311) | round(2) }}
      - name: "Dyson Heater Plug Energy Cost Monthly"
        unique_id: dyson_heater_plug_energy_cost_monthly
        unit_of_measurement: "$"
        state: >
          {{ (states('sensor.dyson_heater_plug_this_month_s_energy') | float(0) * 0.2311) | round(2) }}
      - name: "Basement Heater Plug Energy Cost Monthly"
        unique_id: basement_heater_plug_energy_cost_monthly
        unit_of_measurement: "$"
        state: >
          {{ (states('sensor.basement_heater_plug_this_month_s_energy') | float(0) * 0.2311) | round(2) }}
      - name: "Total Energy Cost Today"
        unique_id: total_energy_cost_today
        unit_of_measurement: "$"
        state: >
          {{ ((
            states('sensor.desktop_desk_plug_today_s_energy') | float(0) +
            states('sensor.nursery_heater_plug_today_s_energy') | float(0) +
            states('sensor.dyson_heater_plug_today_s_energy') | float(0) +
            states('sensor.basement_heater_plug_today_s_energy') | float(0)
          ) * 0.2311) | round(2) }}
      - name: "Total Energy Cost Monthly"
        unique_id: total_energy_cost_monthly
        unit_of_measurement: "$"
        state: >
          {{ ((
            states('sensor.desktop_desk_plug_this_month_s_energy') | float(0) +
            states('sensor.nursery_heater_plug_this_month_s_energy') | float(0) +
            states('sensor.dyson_heater_plug_this_month_s_energy') | float(0) +
            states('sensor.basement_heater_plug_this_month_s_energy') | float(0)
          ) * 0.2311) | round(2) }}
      - name: "Total Power Draw Now"
        unique_id: total_power_draw_now
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ (
            states('sensor.desktop_desk_plug_current_power') | float(0) +
            states('sensor.nursery_heater_plug_current_power') | float(0) +
            states('sensor.dyson_heater_plug_current_power') | float(0) +
            states('sensor.basement_heater_plug_current_power') | float(0)
          ) | round(1) }}
      - name: "Total Energy Today"
        unique_id: total_energy_today
        unit_of_measurement: "kWh"
        device_class: energy
        state: >
          {{ (
            states('sensor.desktop_desk_plug_today_s_energy') | float(0) +
            states('sensor.nursery_heater_plug_today_s_energy') | float(0) +
            states('sensor.dyson_heater_plug_today_s_energy') | float(0) +
            states('sensor.basement_heater_plug_today_s_energy') | float(0)
          ) | round(2) }}
      - name: "Total Energy This Month"
        unique_id: total_energy_this_month
        unit_of_measurement: "kWh"
        device_class: energy
        state: >
          {{ (
            states('sensor.desktop_desk_plug_this_month_s_energy') | float(0) +
            states('sensor.nursery_heater_plug_this_month_s_energy') | float(0) +
            states('sensor.dyson_heater_plug_this_month_s_energy') | float(0) +
            states('sensor.basement_heater_plug_this_month_s_energy') | float(0)
          ) | round(2) }}
      - name: "Projected Monthly Energy Cost"
        unique_id: projected_monthly_energy_cost
        unit_of_measurement: "$"
        state: >
          {% set day_of_month = now().day %}
          {% set days_in_month = (now().replace(month=now().month % 12 + 1, day=1) - timedelta(days=1)).day if now().month < 12 else 31 %}
          {% set monthly_kwh = states('sensor.total_energy_this_month') | float(0) %}
          {% if day_of_month > 0 and monthly_kwh > 0 %}
            {{ ((monthly_kwh / day_of_month) * days_in_month * 0.2311) | round(2) }}
          {% else %}
            0
          {% endif %}
      - name: "Daily Average Energy This Month"
        unique_id: daily_average_energy_this_month
        unit_of_measurement: "kWh"
        device_class: energy
        state: >
          {% set day_of_month = now().day %}
          {% set monthly_kwh = states('sensor.total_energy_this_month') | float(0) %}
          {% if day_of_month > 0 %}
            {{ (monthly_kwh / day_of_month) | round(2) }}
          {% else %}
            0
          {% endif %}
      - name: "Daily Average Energy Cost This Month"
        unique_id: daily_average_energy_cost_this_month
        unit_of_measurement: "$"
        state: >
          {% set day_of_month = now().day %}
          {% set monthly_kwh = states('sensor.total_energy_this_month') | float(0) %}
          {% if day_of_month > 0 %}
            {{ ((monthly_kwh / day_of_month) * 0.2311) | round(2) }}
          {% else %}
            0
          {% endif %}
      - name: "Desktop Desk Plug Share of Total"
        unique_id: desktop_desk_plug_share_pct
        unit_of_measurement: "%"
        state: >
          {% set total = states('sensor.total_energy_this_month') | float(0) %}
          {% set device = states('sensor.desktop_desk_plug_this_month_s_energy') | float(0) %}
          {{ ((device / total) * 100) | round(1) if total > 0 else 0 }}
      - name: "Nursery Heater Plug Share of Total"
        unique_id: nursery_heater_plug_share_pct
        unit_of_measurement: "%"
        state: >
          {% set total = states('sensor.total_energy_this_month') | float(0) %}
          {% set device = states('sensor.nursery_heater_plug_this_month_s_energy') | float(0) %}
          {{ ((device / total) * 100) | round(1) if total > 0 else 0 }}
      - name: "Dyson Heater Plug Share of Total"
        unique_id: dyson_heater_plug_share_pct
        unit_of_measurement: "%"
        state: >
          {% set total = states('sensor.total_energy_this_month') | float(0) %}
          {% set device = states('sensor.dyson_heater_plug_this_month_s_energy') | float(0) %}
          {{ ((device / total) * 100) | round(1) if total > 0 else 0 }}
      - name: "Basement Heater Plug Share of Total"
        unique_id: basement_heater_plug_share_pct
        unit_of_measurement: "%"
        state: >
          {% set total = states('sensor.total_energy_this_month') | float(0) %}
          {% set device = states('sensor.basement_heater_plug_this_month_s_energy') | float(0) %}
          {{ ((device / total) * 100) | round(1) if total > 0 else 0 }}
      - name: "Estimated Annual Energy Cost"
        unique_id: estimated_annual_energy_cost
        unit_of_measurement: "$"
        state: >
          {% set daily_avg = states('sensor.daily_average_energy_this_month') | float(0) %}
          {{ (daily_avg * 365 * 0.2311) | round(2) }}

sensor:
  - platform: rest
    name: OpenMeteo Raw
    resource: "https://api.open-meteo.com/v1/forecast?latitude=39.9354267&longitude=-75.15329726862069&current=temperature_2m,apparent_temperature,relative_humidity_2m&hourly=apparent_temperature,relative_humidity_2m&timezone=auto&temperature_unit=fahrenheit"
    json_attributes:
      - current
      - hourly
    value_template: "{{ value_json.current.temperature_2m if value_json.current is defined else 'unavailable' }}"
    unit_of_measurement: "°F"
    scan_interval: 600

  - platform: derivative
    source: sensor.andrew_distance_to_home_mi
    name: Andrew Approach Speed (mph)
    unit_time: h
    time_window: "00:05:00"
    round: 1

binary_sensor:
  - platform: trend
    sensors:
      andrew_towards_home_slow:
        entity_id: sensor.andrew_distance_to_home_mi
        invert: true
        sample_duration: 600
        min_gradient: 0.0001

zone:
  - name: Andrew-Work
    latitude: 39.9498
    longitude: -75.1475
    radius: 200
    icon: mdi:briefcase
  - name: Amy-Work
    latitude: 39.83833360474063
    longitude: -75.43974637985231
    radius: 1150
    icon: mdi:briefcase
  - name: Home
    latitude: 39.9354267
    longitude: -75.15329726862069
    radius: 500
    icon: mdi:home

mqtt:
  sensor:
    - name: Zigbee2mqtt Networkmap
      state_topic: zigbee2mqtt/bridge/response/networkmap
      value_template: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      json_attributes_topic: zigbee2mqtt/bridge/response/networkmap
      json_attributes_template: "{{ value_json.data.value | tojson }}"

shell_command:
  git_push: "sh /config/git_push.sh"
  git_pull: "sh /config/git_pull.sh"


lovelace:
  mode: storage
  dashboards:
    lovelace-energy:
      mode: yaml
      title: Energy Monitor
      filename: dashboards/energy-monitor.yaml
      icon: mdi:lightning-bolt
      show_in_sidebar: true

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
