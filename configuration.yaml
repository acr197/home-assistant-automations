# Core: HA Cloud + default integration bundle
cloud:
default_config:

wake_on_lan:
  # Enables wake_on_lan.send_magic_packet, used by script.wake_andrews_desktop (the
  # "Wake Desktop" dashboard button). Whether the tile lights yellow (PC on) is decided
  # by binary_sensor.desktop_on in the template section below, not by this integration.

# Recorder: batch writes every 30s (SD-card wear) and skip recording history for the
# noisy plug voltage/amps sensors. Live values still update; only their history graphs
# are dropped. Watts (current_consumption) and signal strength are kept.
recorder:
  commit_interval: 30
  exclude:
    entity_globs:
      - sensor.*_voltage
      - sensor.*_current

homeassistant:
  packages: !include_dir_named packages   # load packages/*.yaml (Energy)
  external_url: "https://virusdistributioncenter.duckdns.org"
  internal_url: "http://192.168.0.100:8123"
  country: "US"

# HTTPS via DuckDNS / Let's Encrypt certs
http:
  ssl_certificate: /ssl/fullchain.pem
  ssl_key: /ssl/privkey.pem

# Text-to-speech
tts:
  - platform: google_translate

# Person groups for presence logic + guest-mode automation set
group:
  household_anyone_home:
    name: Anyone Home
    entities:
      - person.andrew
      - person.amy
  household_everyone_home:
    name: Everyone Home
    all: true
    entities:
      - person.andrew
      - person.amy
  guest_mode_thermostat_automations:
    name: Guest Mode Thermostat Automations
    entities:
      - automation.thermostat_change_to_eco_when_away
      - automation.thermostat_when_thermostat_is_over_76_and_andrew_and_amy_are_at_work_turn_thermostat_eco_off_at_1_30pm
      - automation.thermostat_when_thermostat_is_under_63_and_andrew_and_amy_are_at_work_at_1_30pm_turn_thermostat_eco_off

# Toggle helpers: guest mode + dashboard view switches
input_boolean:
  guest_mode:
  power_draw_7d_view:
    name: "Power Draw: 7-Day View"
    icon: mdi:calendar-week
  cost_view_today:
    name: "Cost View: Today"
    icon: mdi:calendar-today

# Buttons that fire the GitHub push/pull shell commands
input_button:
  push_to_github:
    name: Push to GitHub
    icon: mdi:cloud-upload
  pull_from_github:
    name: Pull from GitHub
    icon: mdi:cloud-download

# Template sensors: guest-mode status, thermostat heat/cool state, and OpenMeteo
# outdoor weather. (Energy/cost templates live in packages/energy.yaml.)
template:
  # Desktop on/off detector for the "Wake Desktop" dashboard tile. Ping alone is
  # unreliable: Windows blocks ICMP by default, so a powered-on PC answers nothing
  # and reads as off. This also watches the Desktop Desk Plug's live power draw and
  # reports ON when the plug pulls real watts OR the PC still answers ping.
  - binary_sensor:
      - name: Desktop On
        unique_id: desktop_on
        device_class: running
        # Debounce brief power dips so the tile doesn't flicker off under load swings.
        delay_off: "00:00:30"
        # Wall watts above this = PC running. Soft-off/sleep sits under ~10W (WoL
        # standby); a running desktop idles well above it. To tune: watch
        # sensor.tapo_p110m_1_current_consumption on the Energy dashboard with the
        # PC on vs off, then pick a value between the two readings.
        state: >
          {{ states('sensor.tapo_p110m_1_current_consumption') | float(0) > 25
             or is_state('binary_sensor.192_168_0_24', 'on') }}
  - sensor:
      - name: Guest Mode Status
        unique_id: guest_mode_status
        state: "{{ 'Active' if is_state('input_boolean.guest_mode','on') else 'Inactive' }}"
      - name: "Thermostat Heating State"
        unique_id: thermostat_heating_state
        state: "{{ is_state_attr('climate.thermostat', 'hvac_action', 'heating') }}"
      - name: "Thermostat Cooling State"
        unique_id: thermostat_cooling_state
        state: "{{ is_state_attr('climate.thermostat', 'hvac_action', 'cooling') }}"
      - name: "Outdoor Temperature"
        unique_id: outdoor_temperature_openmeteo
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ state_attr('sensor.openmeteo_raw','current') not in [None, 'unknown', 'unavailable'] }}
        state: >
          {% set cw = state_attr('sensor.openmeteo_raw','current') %}
          {{ cw['temperature_2m'] if cw else None }}
      - name: "Outdoor Feels Like"
        unique_id: outdoor_feels_like_openmeteo
        unit_of_measurement: "°F"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ state_attr('sensor.openmeteo_raw','current') not in [None, 'unknown', 'unavailable'] }}
        state: >
          {% set cw = state_attr('sensor.openmeteo_raw','current') %}
          {{ cw['apparent_temperature'] if cw else None }}
      - name: "Outdoor Humidity"
        unique_id: outdoor_humidity_openmeteo
        unit_of_measurement: "%"
        device_class: humidity
        state_class: measurement
        availability: >
          {{ state_attr('sensor.openmeteo_raw','current') not in [None, 'unknown', 'unavailable'] }}
        state: >
          {% set cw = state_attr('sensor.openmeteo_raw','current') %}
          {{ cw['relative_humidity_2m'] if cw else None }}

# OpenMeteo weather feed - source for the Outdoor template sensors
sensor:
  - platform: rest
    name: OpenMeteo Raw
    resource: "https://api.open-meteo.com/v1/forecast?latitude=39.9354267&longitude=-75.15329726862069&current=temperature_2m,apparent_temperature,relative_humidity_2m&timezone=auto&temperature_unit=fahrenheit"
    json_attributes:
      - current
    value_template: "{{ value_json.current.temperature_2m if value_json.current is defined else 'unavailable' }}"
    unit_of_measurement: "°F"
    scan_interval: 600

# Work + home zones for geolocation automations
zone:
  - name: Andrew-Work
    latitude: 39.9498
    longitude: -75.1475
    radius: 200
    icon: mdi:briefcase
  - name: Amy-Work
    latitude: 39.83833360474063
    longitude: -75.43974637985231
    radius: 1150
    icon: mdi:briefcase
  - name: Home
    latitude: 39.9354267
    longitude: -75.15329726862069
    radius: 500
    icon: mdi:home

# Git sync scripts (GitHub dashboard buttons + nightly backup)
shell_command:
  git_push: "sh /config/git_push.sh"
  git_pull: "sh /config/git_pull.sh"

# Dashboards: storage-mode Overview + two YAML dashboards
lovelace:
  mode: storage
  dashboards:
    lovelace-energy:
      mode: yaml
      title: Energy Monitor
      filename: dashboards/energy-monitor.yaml
      icon: mdi:lightning-bolt
      show_in_sidebar: true
    lovelace-github:
      mode: yaml
      title: GitHub Sync
      filename: dashboards/github-sync.yaml
      icon: mdi:github
      show_in_sidebar: true

# Split config files
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
